<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>نظام مبيعات البسفور</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0a1e;
  --bg2:#160e2e;
  --bg3:#1e1340;
  --card:#1a1035;
  --card2:#231547;
  --border:#2d1f5e;
  --purple:#7c3aed;
  --purple2:#a78bfa;
  --purple3:#6d28d9;
  --gold:#f5c518;
  --gold2:#ffd700;
  --gold3:#b8860b;
  --green:#10b981;
  --red:#ef4444;
  --blue:#38bdf8;
  --orange:#f97316;
  --text:#e8e8f8;
  --muted:#7b6fa0;
  --nav-h:72px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Cairo',sans-serif;
  direction:rtl;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ===== BACKGROUND EFFECTS ===== */
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.bg-orb1{width:400px;height:400px;background:radial-gradient(circle,#4c1d9533 0%,transparent 70%);top:-100px;right:-100px;}
.bg-orb2{width:300px;height:300px;background:radial-gradient(circle,#7c3aed22 0%,transparent 70%);bottom:100px;left:-80px;}
.bg-orb3{width:200px;height:200px;background:radial-gradient(circle,#f5c51811 0%,transparent 70%);top:40%;right:20%;}

/* ===== LOADING ===== */
#loading{
position:fixed;inset:0;z-index:9999;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:var(–bg);gap:16px;
}
.spin{width:40px;height:40px;border:3px solid var(–border);border-top-color:var(–purple2);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== SCREENS ===== */
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}

/* ===== LOGIN SCREEN ===== */
#screen-login{
min-height:100vh;
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:20px;
background:var(–bg);
position:relative;overflow:hidden;
}
.login-hero{
display:flex;flex-direction:column;align-items:center;margin-bottom:32px;animation:fadeUp .8s ease both;
}
.login-hero-img{
width:120px;height:120px;
background:radial-gradient(circle at 50% 40%,#7c3aed44,transparent 70%);
display:flex;align-items:center;justify-content:center;
font-size:72px;margin-bottom:4px;
filter:drop-shadow(0 0 20px #f5c51866);
animation:floatCrown 3s ease-in-out infinite;
}
@keyframes floatCrown{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-title{
font-size:24px;font-weight:900;
background:linear-gradient(135deg,var(–gold2),var(–purple2),var(–gold));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
text-align:center;line-height:1.3;margin-top:8px;
}
.login-sub{font-size:13px;color:var(–muted);margin-top:4px;}

.login-box{
width:100%;max-width:360px;
background:linear-gradient(145deg,var(–card),var(–bg2));
border:1px solid var(–border);
border-radius:24px;padding:28px;
box-shadow:0 20px 60px #00000066;
animation:fadeUp .8s .2s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.role-toggle{display:flex;background:var(–bg);border-radius:14px;padding:4px;margin-bottom:20px;border:1px solid var(–border);}
.role-btn{
flex:1;padding:10px;border-radius:11px;border:none;
font-family:‘Cairo’,sans-serif;font-size:13px;font-weight:700;
cursor:pointer;transition:all .25s;color:var(–muted);background:none;
}
.role-btn.active{background:var(–purple);color:#fff;box-shadow:0 4px 14px #7c3aed55;}

.inp-wrap{position:relative;margin-bottom:14px;}
.inp-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(–muted);}
.l-inp{
width:100%;padding:13px 44px 13px 14px;
border-radius:13px;border:1px solid var(–border);
background:var(–bg);color:var(–text);
font-family:‘Cairo’,sans-serif;font-size:14px;
outline:none;transition:border-color .2s;
}
.l-inp:focus{border-color:var(–purple2);}
.l-inp::placeholder{color:var(–muted);}

.login-btn-main{
width:100%;padding:14px;border-radius:13px;border:none;
background:linear-gradient(135deg,var(–purple),var(–purple3));
color:#fff;font-family:‘Cairo’,sans-serif;font-size:15px;font-weight:900;
cursor:pointer;box-shadow:0 6px 20px #7c3aed44;
transition:all .2s;margin-top:4px;
}
.login-btn-main:active{transform:scale(.98);}
.login-err{color:var(–red);font-size:12px;text-align:center;min-height:18px;margin-top:8px;}

/* ===== MAIN APP ===== */
#screen-app{min-height:100vh;padding-bottom:var(–nav-h);}

/* ===== TOP HEADER ===== */
.top-header{
background:linear-gradient(180deg,var(–bg2),transparent);
padding:16px 18px 12px;
display:flex;align-items:center;justify-content:space-between;
position:sticky;top:0;z-index:100;
backdrop-filter:blur(12px);
border-bottom:1px solid #ffffff08;
}
.th-logo{
font-size:16px;font-weight:900;
background:linear-gradient(135deg,var(–gold2),var(–purple2));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
display:flex;align-items:center;gap:6px;
}
.th-right{display:flex;align-items:center;gap:8px;}
.role-pill{
padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;
background:var(–purple)22;border:1px solid var(–purple)44;color:var(–purple2);
}
.role-pill.emp{background:#f59e0b22;border-color:#f59e0b44;color:#f59e0b;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(–green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 #10b98166}50%{opacity:.6;box-shadow:0 0 0 4px #10b98100}}
.logout-btn{
background:var(–bg);border:1px solid var(–border);color:var(–muted);
padding:6px 10px;border-radius:10px;font-family:‘Cairo’,sans-serif;font-size:11px;
cursor:pointer;
}

/* ===== WINNER BANNER ===== */
.winner-banner{
background:linear-gradient(90deg,var(–purple3),var(–purple),#8b5cf6,var(–purple),var(–purple3));
background-size:300% 100%;
animation:gradSlide 4s linear infinite;
padding:12px 18px;
display:flex;align-items:center;justify-content:center;
gap:14px;flex-wrap:wrap;text-align:center;
}
@keyframes gradSlide{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.w-crown{animation:bounce 1s infinite;display:inline-block;font-size:18px;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.w-item{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#fff;}
.w-name{color:var(–gold2);font-size:15px;}
.w-sep{color:#ffffff44;margin:0 8px;font-size:10px;}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
position:fixed;bottom:0;left:0;right:0;
height:var(–nav-h);
background:linear-gradient(180deg,transparent,var(–bg2) 20%);
backdrop-filter:blur(20px);
border-top:1px solid var(–border);
display:flex;align-items:center;justify-content:space-around;
z-index:100;padding:0 6px;padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-item{
display:flex;flex-direction:column;align-items:center;gap:4px;
padding:8px 14px;border-radius:14px;cursor:pointer;transition:all .2s;
position:relative;flex:1;max-width:80px;
}
.nav-item.active{background:var(–purple)22;}
.nav-icon{font-size:22px;transition:transform .2s;}
.nav-item.active .nav-icon{transform:translateY(-2px);}
.nav-lbl{font-size:10px;font-weight:700;color:var(–muted);transition:color .2s;}
.nav-item.active .nav-lbl{color:var(–purple2);}
.nav-badge{
position:absolute;top:6px;right:10px;
background:var(–red);color:#fff;border-radius:50%;
width:16px;height:16px;font-size:9px;font-weight:900;
display:flex;align-items:center;justify-content:center;
}
.nav-active-line{
position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
width:20px;height:3px;border-radius:3px 3px 0 0;
background:var(–purple2);display:none;
}
.nav-item.active .nav-active-line{display:block;}

/* ===== PAGE CONTAINER ===== */
.page{display:none;padding:14px 16px;}
.page.active{display:block;}

/* ===== SECTION TITLE ===== */
.sec-title{
font-size:18px;font-weight:900;margin-bottom:18px;
display:flex;align-items:center;gap:8px;
}
.sec-title::before{content:’’;width:4px;height:20px;background:var(–purple2);border-radius:4px;display:block;}

/* ===== STORE CARDS ===== */
.stores-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.store-card{
background:linear-gradient(145deg,var(–card),var(–bg2));
border:1px solid var(–border);border-radius:16px;
padding:14px 10px;cursor:pointer;transition:all .2s;
position:relative;overflow:hidden;text-align:center;
}
.store-card::before{
content:’’;position:absolute;top:-30px;right:-30px;
width:80px;height:80px;border-radius:50%;
opacity:0;transition:opacity .3s;
}
.store-card.sel{border-width:2px;box-shadow:0 0 0 3px var(–glow,var(–purple))22;}
.store-card.sel::before{opacity:1;}
.s-icon{font-size:26px;margin-bottom:6px;}
.s-name{font-size:12px;font-weight:900;}
.s-sub{font-size:10px;color:var(–muted);margin-top:2px;}
.s-total{
margin-top:8px;font-size:13px;font-weight:900;
padding-top:7px;border-top:1px solid var(–border);
}
.s-row{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;}
.s-row span{color:var(–muted);}
.sel-ring{
position:absolute;top:6px;right:6px;
width:8px;height:8px;border-radius:50%;
background:var(–purple2);display:none;
}
.store-card.sel .sel-ring{display:block;}

/* ===== POS BOX ===== */
.pos-box{
background:linear-gradient(145deg,var(–card),var(–bg2));
border:1px solid var(–border);border-radius:20px;
padding:18px;margin-bottom:16px;
}
.pos-type-row{display:flex;gap:8px;margin-bottom:16px;}
.pos-type-btn{
flex:1;padding:11px 8px;border-radius:12px;
border:2px solid var(–border);background:var(–bg);
color:var(–muted);font-family:‘Cairo’,sans-serif;font-size:12px;font-weight:700;
cursor:pointer;transition:all .2s;text-align:center;
}
.pos-type-btn.ts{border-color:var(–purple2);background:#7c3aed18;color:var(–purple2);}
.pos-type-btn.td{border-color:var(–blue);background:#38bdf818;color:var(–blue);}

.sum-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.sum-card{
background:var(–bg);border-radius:12px;padding:10px 12px;
border:1px solid var(–border);text-align:center;
}
.sum-lbl{font-size:10px;color:var(–muted);margin-bottom:3px;}
.sum-val{font-size:13px;font-weight:900;}

.inp-lbl{font-size:11px;color:var(–muted);margin-bottom:5px;}
.inp{
width:100%;padding:11px 14px;border-radius:12px;
border:1px solid var(–border);background:var(–bg);
color:var(–text);font-family:‘Cairo’,sans-serif;font-size:13px;
outline:none;transition:border-color .2s;
}
.inp:focus{border-color:var(–purple2);}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}

.emp-sel-wrap{position:relative;}
.emp-btn{
width:100%;padding:11px 14px;border-radius:12px;
border:1px solid var(–border);background:var(–bg);
color:var(–text);font-family:‘Cairo’,sans-serif;font-size:13px;
cursor:pointer;display:flex;align-items:center;justify-content:space-between;
}
.emp-dropdown{
display:none;position:absolute;top:calc(100%+4px);right:0;left:0;
background:var(–card2);border:1px solid var(–border);
border-radius:14px;overflow:hidden;z-index:50;
box-shadow:0 10px 30px #00000088;
}
.emp-opt{padding:12px 16px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;transition:background .15s;}
.emp-opt:hover{background:var(–purple)22;}

.add-btn{
width:100%;padding:14px;border-radius:14px;border:none;
font-family:‘Cairo’,sans-serif;font-size:14px;font-weight:900;
cursor:pointer;color:#fff;transition:all .2s;
box-shadow:0 6px 20px var(–btn-glow,#7c3aed55);
}
.add-btn:active{transform:scale(.98);}
.add-btn.store-mode{background:linear-gradient(135deg,var(–purple2),var(–purple));–btn-glow:#7c3aed55;}
.add-btn.del-mode{background:linear-gradient(135deg,#38bdf8,#0284c7);–btn-glow:#38bdf855;}

/* ===== SALES TABLE ===== */
.sales-table-wrap{
background:linear-gradient(145deg,var(–card),var(–bg2));
border:1px solid var(–border);border-radius:20px;overflow:hidden;
}
.sales-table-head{
display:grid;grid-template-columns:2fr 1fr 1fr auto;
padding:12px 16px;border-bottom:1px solid var(–border);
font-size:11px;color:var(–muted);font-weight:700;
}
.sale-row{
display:grid;grid-template-columns:2fr 1fr 1fr auto;
padding:12px 16px;border-bottom:1px solid var(–border)55;
align-items:center;transition:background .15s;font-size:12px;
}
.sale-row:last-child{border:none;}
.sale-row:hover{background:#ffffff04;}
.badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-s{background:#7c3aed18;border:1px solid #7c3aed44;color:var(–purple2);}
.badge-d{background:#38bdf818;border:1px solid #38bdf844;color:var(–blue);}
.sale-emp{font-size:11px;color:var(–muted);}
.sale-time{font-size:10px;color:var(–muted);}
.act-btn{background:none;border:none;color:var(–muted);cursor:pointer;padding:4px;font-size:14px;line-height:1;}

/* ===== REPORT ===== */
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.chip{
padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;
border:1px solid var(–border);background:var(–bg);color:var(–muted);
cursor:pointer;transition:all .2s;font-family:‘Cairo’,sans-serif;
}
.chip.active{background:var(–purple);border-color:var(–purple);color:#fff;}
.date-range-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.date-inp{
padding:8px 12px;border-radius:10px;border:1px solid var(–border);
background:var(–bg);color:var(–text);font-family:‘Cairo’,sans-serif;font-size:12px;
outline:none;flex:1;min-width:130px;
}
.date-inp:focus{border-color:var(–purple2);}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.8);}

.grand-card{
background:linear-gradient(135deg,var(–purple)22,var(–purple2)11);
border:1px solid var(–purple)44;
border-radius:18px;padding:18px 20px;margin-bottom:16px;
display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
}
.grand-total{font-size:26px;font-weight:900;}
.grand-subs{display:flex;gap:18px;flex-wrap:wrap;}
.grand-sub{text-align:center;}
.grand-sub-lbl{font-size:10px;color:var(–muted);margin-bottom:3px;}
.grand-sub-val{font-size:14px;font-weight:900;}

.rep-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.rep-card{
background:linear-gradient(145deg,var(–card),var(–bg2));
border:1px solid var(–border);border-radius:16px;
padding:14px;text-align:center;
}
.rep-card-icon{font-size:22px;margin-bottom:5px;}
.rep-card-name{font-size:10px;color:var(–muted);margin-bottom:5px;}
.rep-card-total{font-size:16px;font-weight:900;}
.rep-mini{font-size:10px;color:var(–muted);margin-top:4px;}

.chart-box{
background:linear-gradient(145deg,var(–card),var(–bg2));
border:1px solid var(–border);border-radius:18px;padding:16px;margin-bottom:16px;
}
.bar-wrap{margin-bottom:10px;}
.bar-meta{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;}
.bar-track{height:10px;background:var(–bg);border-radius:10px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:10px;transition:width .5s ease;}

/* ===== WALLETS ===== */
.wallet-card{
background:linear-gradient(145deg,var(–card),var(–bg2));
border:1px solid var(–border);border-radius:20px;
padding:18px;margin-bottom:14px;
}
.wc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.wc-name{font-size:16px;font-weight:900;display:flex;align-items:center;gap:8px;}
.wc-balance-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.wc-bal{
background:var(–bg);border-radius:13px;padding:13px 14px;
border:1px solid var(–border);
}
.wc-bal-lbl{font-size:10px;color:var(–muted);margin-bottom:4px;}
.wc-bal-val{font-size:18px;font-weight:900;}
.wc-actions{display:flex;gap:6px;flex-wrap:wrap;}
.wc-btn{
flex:1;min-width:70px;padding:8px 6px;border-radius:10px;border:none;
font-family:‘Cairo’,sans-serif;font-size:10px;font-weight:700;
cursor:pointer;text-align:center;transition:all .15s;
}
.wc-btn:active{transform:scale(.96);}
.tx-list{margin-top:12px;border-top:1px solid var(–border);padding-top:12px;}
.tx-item{
display:flex;justify-content:space-between;align-items:center;
padding:8px 0;border-bottom:1px solid var(–border)33;font-size:11px;
}
.tx-item:last-child{border:none;}
.tx-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}

/* ===== ATTENDANCE ===== */
.attend-today-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.attend-emp-card{
background:linear-gradient(145deg,var(–card),var(–bg2));
border:1px solid var(–border);border-radius:16px;padding:14px;
}
.punch-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.punch-btn{
padding:16px;border-radius:16px;border:none;
font-family:‘Cairo’,sans-serif;font-size:14px;font-weight:900;
cursor:pointer;color:#fff;transition:all .2s;
}

/* ===== NOTIFICATIONS ===== */
.notif-item{
background:linear-gradient(145deg,var(–card),var(–bg2));
border:1px solid var(–border);border-radius:16px;
padding:14px;margin-bottom:10px;
display:flex;gap:12px;align-items:flex-start;
}
.notif-item.unread{border-color:var(–purple)55;background:var(–purple)08;}
.notif-dot{width:8px;height:8px;min-width:8px;border-radius:50%;background:var(–purple2);margin-top:4px;}

/* ===== BROADCAST ===== */
.bc-area{
background:var(–bg);border:1px solid var(–border);border-radius:14px;
color:var(–text);font-family:‘Cairo’,sans-serif;font-size:13px;
padding:14px;width:100%;resize:vertical;outline:none;min-height:100px;
}
.bc-area:focus{border-color:var(–purple2);}

/* ===== SETTINGS ===== */

/* ===== MODAL ===== */
.overlay{
position:fixed;inset:0;background:#000c;
display:flex;align-items:center;justify-content:center;
z-index:200;padding:16px;animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
background:var(–card2);border:1px solid var(–border);border-radius:24px;
width:100%;max-width:420px;padding:24px;
max-height:90vh;overflow-y:auto;
animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:16px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.form-row{margin-bottom:14px;}
.form-actions{display:flex;gap:10px;margin-top:20px;}
.modal-btn{
flex:1;padding:13px;border-radius:13px;border:none;
font-family:‘Cairo’,sans-serif;font-size:13px;font-weight:700;
cursor:pointer;transition:all .2s;
}

/* ===== BROADCAST ALERT ===== */
.broadcast-alert{
position:fixed;inset:0;background:#000d;
display:flex;align-items:center;justify-content:center;
z-index:300;padding:20px;
}
.ba-box{
background:var(–card2);border:2px solid var(–purple)77;
border-radius:24px;padding:28px;width:100%;max-width:380px;text-align:center;
}

/* ===== MY WALLET (EMP) ===== */
.my-wallet-hero{
background:linear-gradient(145deg,var(–card),var(–bg2));
border:1px solid var(–border);border-radius:24px;
padding:24px;margin-bottom:16px;text-align:center;
}
.my-avatar{font-size:56px;margin-bottom:10px;}
.my-name{font-size:22px;font-weight:900;}

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,addDoc,deleteDoc,updateDoc,setDoc,doc,serverTimestamp,query,orderBy,getDoc}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const FC={apiKey:"AIzaSyAsllnjBZO4K9MyJNiTFoQJSfKtycQHMtU",authDomain:"bosphorus-76067.firebaseapp.com",projectId:"bosphorus-76067",storageBucket:"bosphorus-76067.firebasestorage.app",messagingSenderId:"678947739557",appId:"1:678947739557:web:f3d70cfc44d862ddf53a4c"};
const app=initializeApp(FC);
const db=getFirestore(app);
const salesCol=collection(db,"shop_sales");
const walletsCol=collection(db,"wallets");
const txCol=collection(db,"wallet_tx");
const attendCol=collection(db,"attendance");
const notifsCol=collection(db,"notifications");

const STORES=[{id:1,name:"محل 1",icon:"🏪",color:"#a78bfa"},{id:2,name:"محل 2",icon:"🏬",color:"#10B981"},{id:3,name:"محل 3",icon:"🛒",color:"#F59E0B"}];
const EMPS=[["عمار","👨‍💼"],["جعفر","👨‍💼"],["مثنى","👨‍💼"],["نوره","👩‍💼"]];
const EMP_PASS={"عمار":"111","جعفر":"222","مثنى":"333","نوره":"444"};
const EMP_STORE={"عمار":1,"نوره":2,"جعفر":3,"مثنى":2};
const SALARIES={"عمار":200000,"جعفر":250000,"مثنى":250000,"نوره":200000};
const EMP_ICONS={"عمار":"👨‍💼","جعفر":"👨‍💼","مثنى":"👨‍💼","نوره":"👩‍💼"};
const EMP_COLORS={"عمار":"#a78bfa","جعفر":"#10B981","مثنى":"#38bdf8","نوره":"#F59E0B"};
const PASS={owner:"0000"};
const PPW=5,PV=1000;
const WORK_START="12:00",SHOP_LAT=33.31033,SHOP_LNG=44.32380,MAX_DIST=100;

function today(){return new Date().toLocaleDateString("en-CA");}function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toLocaleDateString("en-CA");}
function fmt(n){return Number(n||0).toLocaleString("en-IQ")+" د.ع";}
function fmtPts(n){return Number(n||0)+" نقطة";}
function calcDist(a,b,c,d){const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;const q=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q));}
function tMins(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function weekStart(){const d=new Date(),day=d.getDay(),diff=d.getDate()-((day+6)%7);const m=new Date(d);m.setDate(diff);return m.toLocaleDateString("en-CA");}

let S={
  loggedIn:false,role:null,empName:null,
  tab:"pos",sel:1,saleType:"store",
  sales:[],wallets:{},txs:[],attendance:[],notifs:[],
  empSel:"",loaded:false,
  editId:null,editSaleId:null,
  repFrom:today(),repTo:today(),repStore:"all",repType:"all",repPeriod:"today",
  modal:null,gpsLoading:false,pendingNotif:null,camType:null,camReady:false,repSalesPeriod:"today",repSalesFrom:today(),repSalesTo:today(),
};
let cdI=null,cdS=0,camStream=null;

// ===== FIREBASE LISTENERS =====
onSnapshot(query(salesCol,orderBy("createdAt","desc")),function(snap){
  S.sales=snap.docs.map(d=>({...d.data(),id:d.id}));
  S.loaded=true;syncOk();
  const td=today();
  const sw=new Set(S.sales.filter(x=>x.date===td&&x.type==="store").map(x=>x.store));
  if(STORES.every(s=>sw.has(s.id))&&!cdI&&cdS===0){
    getDoc(doc(db,"winners","winner_"+td)).then(ws=>{if(!ws.exists())startCD();});
  }
  render();
},()=>syncErr());

onSnapshot(walletsCol,snap=>{S.wallets={};snap.docs.forEach(d=>{S.wallets[d.id]={...d.data(),id:d.id};});render();});
onSnapshot(query(txCol,orderBy("createdAt","desc")),snap=>{S.txs=snap.docs.map(d=>({...d.data(),id:d.id}));render();});
onSnapshot(query(attendCol,orderBy("createdAt","desc")),snap=>{S.attendance=snap.docs.map(d=>({...d.data(),id:d.id}));render();});
onSnapshot(query(notifsCol,orderBy("createdAt","desc")),snap=>{
  S.notifs=snap.docs.map(d=>({...d.data(),id:d.id}));
  if(S.loggedIn&&S.empName&&!S.pendingNotif){
    const u=S.notifs.find(n=>n.type==="broadcast"&&!(n.readBy||{})[S.empName]);
    if(u)S.pendingNotif=u;
  }
  render();
});

async function initWallets(){
  for(const[name]of EMPS){const ref=doc(db,"wallets",name);const snap=await getDoc(ref);if(!snap.exists())await setDoc(ref,{name,balance:0,points:0,createdAt:serverTimestamp()});}
}
initWallets();

function syncOk(){const d=document.getElementById("sync-dot");if(d){d.style.background="var(--green)";d.title="متصل";}}
function syncErr(){const d=document.getElementById("sync-dot");if(d){d.style.background="var(--red)";d.title="غير متصل";}}

// ===== LOGIN =====
window.setRole=function(r){
  document.getElementById("role-owner").className="role-btn"+(r==="owner"?" active":"");
  document.getElementById("role-emp").className="role-btn"+(r==="emp"?" active":"");
};
window.tryLogin=function(){
  const pass=document.getElementById("pass-inp").value.trim();
  const err=document.getElementById("login-err");
  if(pass===PASS.owner){S.loggedIn=true;S.role="owner";S.empName=null;render();return;}
  for(const[name,p]of Object.entries(EMP_PASS)){
    if(pass===p){S.loggedIn=true;S.role="employee";S.empName=name;S.empSel=name;S.tab="pos";
      const u=S.notifs.find(n=>n.type==="broadcast"&&!(n.readBy||{})[name]);
      if(u)S.pendingNotif=u;render();return;}
  }
  err.textContent="❌ كلمة المرور غلط";document.getElementById("pass-inp").value="";
};
function logout(){S.loggedIn=false;S.role=null;S.empName=null;S.empSel="";S.tab="pos";S.pendingNotif=null;render();}
window.logout=logout;

// ===== SALES =====
async function addSale(){
  const el=document.getElementById("inp-amount");
  const amt=el?parseFloat(el.value):0;
  if(!amt||amt<=0){alert("أدخل مبلغ صحيح!");return;}
  if(!S.empSel){alert("اختر اسم الموظف!");return;}
  const now=new Date();syncSaving();
  await addDoc(salesCol,{store:S.sel,amount:amt,emp:S.empSel,type:S.saleType,date:today(),time:now.toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"}),createdAt:serverTimestamp()});
  if(el)el.value="";
  await checkPts();
}
async function delSale(id){if(S.role!=="owner")return;if(!confirm("حذف المبيعة؟"))return;await deleteDoc(doc(db,"shop_sales",id));}
async function saveEdit(){
  const a=document.getElementById("edit-amount"),e=document.getElementById("edit-emp"),t=document.getElementById("edit-type"),s=document.getElementById("edit-store");
  const amt=a?parseFloat(a.value):0;
  if(!amt||amt<=0){alert("أدخل مبلغ صحيح!");return;}
  await updateDoc(doc(db,"shop_sales",S.editId),{amount:amt,emp:e?e.value:"",type:t?t.value:"store",store:s?parseInt(s.value):1});
  S.editId=null;S.modal=null;render();
}
async function saveSaleEdit(){
  const nd=document.getElementById("se-date"),na=document.getElementById("se-amount");
  const newDate=nd?nd.value:"",newAmt=na?parseFloat(na.value):0;
  if(!newDate){alert("اختر تاريخ!");return;}if(!newAmt||newAmt<=0){alert("أدخل مبلغ صحيح!");return;}
  if(!confirm("تعديل المبيعة؟"))return;
  syncSaving();await updateDoc(doc(db,"shop_sales",S.editSaleId),{date:newDate,amount:newAmt});
  S.editSaleId=null;S.modal=null;render();alert("✅ تم تعديل المبيعة");
}
function syncSaving(){const d=document.getElementById("sync-dot");if(d){d.style.background="var(--gold2)";}}

// ===== POINTS =====
async function checkPts(){
  const td=today();const wr=doc(db,"winners","winner_"+td);const ws=await getDoc(wr);if(ws.exists())return;
  const et={};S.sales.filter(x=>x.date===td&&x.type==="store").forEach(x=>{et[x.emp]=(et[x.emp]||0)+x.amount;});
  const ranked=Object.entries(et).sort((a,b)=>b[1]-a[1]);if(!ranked.length)return;
  const winner=ranked[0][0];
  const sw=new Set(S.sales.filter(x=>x.date===td&&x.type==="store").map(x=>x.store));
  if(!STORES.every(s=>sw.has(s.id)))return;
  const wkS=weekStart();
  const wkP=S.txs.filter(x=>x.emp===winner&&x.type==="points"&&x.amount>0&&x.date>=wkS).reduce((a,b)=>a+(b.amount||0),0);
  if(wkP>=25){await setDoc(wr,{emp:winner,date:td,pointsAwarded:false,updatedAt:serverTimestamp()});return;}
  const wRef=doc(db,"wallets",winner);const wSnap=await getDoc(wRef);
  if(wSnap.exists()){
    await updateDoc(wRef,{points:(wSnap.data().points||0)+PPW});
    await addDoc(txCol,{emp:winner,type:"points",amount:PPW,note:"🏆 فائز "+td+" +"+PPW+" نقاط",date:td,createdAt:serverTimestamp()});
    await setDoc(wr,{emp:winner,date:td,pointsAwarded:true,updatedAt:serverTimestamp()});
    await addDoc(notifsCol,{type:"points",to:winner,msg:"🏆 مبروك! فزت باليوم وحصلت على "+PPW+" نقاط",date:td,readBy:{},createdAt:serverTimestamp()});
  }
}
function startCD(){
  cdS=5*60;if(cdI)clearInterval(cdI);
  cdI=setInterval(()=>{
    cdS--;if(cdS<=0){clearInterval(cdI);cdI=null;cdS=0;checkPts();}
    const el=document.getElementById("cd-el");
    if(el){if(cdS>0){const m=Math.floor(cdS/60),s=cdS%60;el.textContent="⏳ النقاط تُضاف بعد "+m+":"+String(s).padStart(2,"0");}else el.textContent="🏆 جاري احتساب...";}
  },1000);
}

// ===== WALLET ACTIONS =====
async function managePoints(empName,pts,add){
  const w=S.wallets[empName]||{points:0};const cur=w.points||0;
  const newPts=add?cur+pts:Math.max(0,cur-pts);
  await updateDoc(doc(db,"wallets",empName),{points:newPts});
  await addDoc(txCol,{emp:empName,type:"points",amount:add?pts:-pts,note:(add?"➕":"➖")+" نقاط من المالك",date:today(),createdAt:serverTimestamp()});
  S.modal=null;render();alert("✅ "+(add?"أضيفت":"حُذفت")+" "+pts+" نقطة");
}
async function addSalary(empName){
  const amt=SALARIES[empName]||0;const ref=doc(db,"wallets",empName);const snap=await getDoc(ref);
  await updateDoc(ref,{balance:((snap.data()&&snap.data().balance)||0)+amt});
  await addDoc(txCol,{emp:empName,type:"salary",amount:amt,note:"راتب أسبوعي 💰",date:today(),createdAt:serverTimestamp()});
  await addDoc(notifsCol,{type:"salary",to:empName,msg:"💰 تم إضافة راتبك "+fmt(amt),date:today(),readBy:{},createdAt:serverTimestamp()});
  alert("✅ "+fmt(amt)+" لـ "+empName);
}
async function addSalaryAll(){if(!confirm("إضافة رواتب للجميع؟"))return;for(const[name]of EMPS)await addSalary(name);}
async function convertPoints(empName){
  const w=S.wallets[empName];if(!w||!w.points){alert("لا توجد نقاط!");return;}
  const pts=w.points,amt=pts*PV;if(!confirm("تحويل "+pts+" نقطة = "+fmt(amt)+"?"))return;
  await updateDoc(doc(db,"wallets",empName),{points:0,balance:(w.balance||0)+amt});
  await addDoc(txCol,{emp:empName,type:"convert",amount:amt,note:"تحويل "+pts+" نقطة",date:today(),createdAt:serverTimestamp()});
  await addDoc(notifsCol,{type:"convert",to:empName,msg:"🎯 تم تحويل "+pts+" نقطة إلى "+fmt(amt),date:today(),readBy:{},createdAt:serverTimestamp()});
}
async function addMoney(empName,amt,note){
  const ref=doc(db,"wallets",empName);const snap=await getDoc(ref);
  await updateDoc(ref,{balance:((snap.data()&&snap.data().balance)||0)+amt});
  await addDoc(txCol,{emp:empName,type:"add",amount:amt,note:note||"إضافة أموال",date:today(),createdAt:serverTimestamp()});
  await addDoc(notifsCol,{type:"add",to:empName,msg:"💵 تم إضافة "+fmt(amt),date:today(),readBy:{},createdAt:serverTimestamp()});
  S.modal=null;render();alert("✅ "+fmt(amt)+" لـ "+empName);
}
async function doWithdraw(empName,amt,note){
  const w=S.wallets[empName];if(!w||(w.balance||0)<amt){alert("الرصيد غير كافي!");return;}
  await updateDoc(doc(db,"wallets",empName),{balance:(w.balance||0)-amt});
  await addDoc(txCol,{emp:empName,type:"withdraw",amount:amt,note:note||"سحب",date:today(),createdAt:serverTimestamp()});
  await addDoc(notifsCol,{type:"withdraw",to:empName,msg:"💸 تم سحب "+fmt(amt),date:today(),readBy:{},createdAt:serverTimestamp()});
  S.modal=null;render();
}
async function resetWallet(empName){
  if(!confirm("تصفير "+empName+"?"))return;
  await updateDoc(doc(db,"wallets",empName),{balance:0,points:0});
  await addDoc(txCol,{emp:empName,type:"reset",amount:0,note:"تصفير",date:today(),createdAt:serverTimestamp()});
}
async function deleteTx(id){
  if(!confirm("حذف هذه المعاملة?"))return;
  const tx=S.txs.find(x=>x.id===id);if(!tx)return;
  const wRef=doc(db,"wallets",tx.emp);const wSnap=await getDoc(wRef);if(!wSnap.exists())return;
  const w=wSnap.data();
  if(tx.type==="salary"||tx.type==="add")await updateDoc(wRef,{balance:Math.max(0,(w.balance||0)-tx.amount)});
  else if(tx.type==="withdraw")await updateDoc(wRef,{balance:(w.balance||0)+tx.amount});
  else if(tx.type==="points"){if(tx.amount>0)await updateDoc(wRef,{points:Math.max(0,(w.points||0)-tx.amount)});else await updateDoc(wRef,{points:(w.points||0)+Math.abs(tx.amount)});}
  else if(tx.type==="convert"){const pb=Math.round(tx.amount/PV);await updateDoc(wRef,{balance:Math.max(0,(w.balance||0)-tx.amount),points:(w.points||0)+pb});}
  await deleteDoc(doc(db,"wallet_tx",id));
}

// ===== ATTENDANCE =====
async function startCamera(type){S.camType=type;S.camReady=false;render();setTimeout(async function(){const vid=document.getElementById("cam-vid");if(!vid)return;try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:false});vid.srcObject=camStream;vid.play();S.camReady=true;render();}catch(e){alert("❌ تعذر فتح الكاميرا!");S.camType=null;render();}},100);}
function stopCamera(){if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}S.camType=null;S.camReady=false;render();}
async function captureAndSave(){const vid=document.getElementById("cam-vid");if(!vid)return;const canvas=document.createElement("canvas");canvas.width=280;canvas.height=210;const ctx=canvas.getContext("2d");ctx.save();ctx.scale(-1,1);ctx.drawImage(vid,-280,0,280,210);ctx.restore();const photo=canvas.toDataURL("image/jpeg",0.45);const empName=S.empName;const td=today();const now=new Date();const ts=now.toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"});const nm=now.getHours()*60+now.getMinutes();const type=S.camType||"in";stopCamera();if(type==="in"){const existing=S.attendance.find(function(x){return x.emp===empName&&x.date===td&&x.punchIn&&!x.punchOut;});if(existing){alert("أنت مسجل حضور بالفعل!");return;}const lb=Math.max(0,nm-timeToMins(WORK_START));await addDoc(attendCol,{emp:empName,date:td,punchIn:ts,punchOut:null,punchInMins:nm,punchOutMins:null,lateBy:lb,hours:null,photoIn:photo,createdAt:serverTimestamp()});alert("✅ تسجيل الحضور
"+ts+"
"+(lb>0?"⚠️ متأخر "+lb+" دقيقة":"✅ في الوقت"));}else{const existing=S.attendance.find(function(x){return x.emp===empName&&x.date===td&&x.punchIn&&!x.punchOut;});if(!existing){alert("ما عندك بصمة حضور!");return;}const hrs=Math.round((nm-existing.punchInMins)/60*10)/10;await updateDoc(doc(db,"attendance",existing.id),{punchOut:ts,punchOutMins:nm,hours:hrs,photoOut:photo});alert("✅ تسجيل الخروج
"+ts+"
ساعات: "+hrs);}render();}
async function punchIn(){await startCamera("in");}
async function punchOut(){await startCamera("out");}
function storeSums(sid,fr,to){
  const items=S.sales.filter(x=>x.store===sid&&x.date>=fr&&x.date<=to);
  const shop=items.filter(x=>x.type==="store").reduce((a,b)=>a+b.amount,0);
  const del=items.filter(x=>x.type==="delivery").reduce((a,b)=>a+b.amount,0);
  return{shop,del,total:shop+del,count:items.length,items};
}
function setRepPeriod(p){
  S.repPeriod=p;
  if(p==="today"){S.repFrom=today();S.repTo=today();}
  else if(p==="week"){S.repFrom=weekStart();S.repTo=today();}
  else if(p==="month"){const d=new Date();S.repFrom=new Date(d.getFullYear(),d.getMonth(),1).toLocaleDateString("en-CA");S.repTo=today();}
  else if(p==="all"){S.repFrom="2020-01-01";S.repTo=today();}
  render();
}

// ===== RENDER WINNER BANNER =====
function renderWinnerBanner(){
  const td=today(),et={};
  S.sales.filter(x=>x.date===td&&x.type==="store").forEach(x=>{et[x.emp]=(et[x.emp]||0)+x.amount;});
  let ranked=Object.entries(et).sort((a,b)=>b[1]-a[1]);
  let label=td;
  if(!ranked.length){
    const allD=Array.from(new Set(S.sales.filter(x=>x.type==="store").map(x=>x.date))).sort((a,b)=>b.localeCompare(a));
    for(const d of allD){if(d===td)continue;const pv={};S.sales.filter(x=>x.date===d&&x.type==="store").forEach(x=>{pv[x.emp]=(pv[x.emp]||0)+x.amount;});if(Object.keys(pv).length){ranked=Object.entries(pv).sort((a,b)=>b[1]-a[1]);label=d;break;}}
  }
  const sw=new Set(S.sales.filter(x=>x.date===td&&x.type==="store").map(x=>x.store));
  const ar=STORES.every(s=>sw.has(s.id)),isT=label===td;
  const meds=["🥇","🥈","🥉"];
  let cdH="";
  if(cdS>0&&ar&&isT){const m=Math.floor(cdS/60),s=cdS%60;cdH=`<span id="cd-el" style="background:#ffffff22;padding:2px 10px;border-radius:20px;font-size:11px">⏳ ${m}:${String(s).padStart(2,"0")}</span>`;}
  else if(ar&&isT)cdH=`<span id="cd-el" style="background:#10b98133;padding:2px 10px;border-radius:20px;font-size:11px;color:var(--green)">✅ كل المحلات سجلت</span>`;
  else if(isT){const ss=STORES.map(s=>sw.has(s.id)?`<span style="color:var(--green)">${s.icon}✓</span>`:`<span style="color:var(--red)">${s.icon}⏳</span>`).join(" ");cdH=`<span id="cd-el" style="background:#ffffff22;padding:2px 10px;border-radius:20px;font-size:11px">${ss}</span>`;}
  if(!ranked.length)return'<div class="winner-banner"><div class="w-item">🏪 <b>نظام مبيعات البسفور</b></div></div>';
  const items=ranked.map((r,i)=>`<div class="w-item"><span class="w-crown">${meds[i]||"🏅"}</span><span>${i===0?(isT?"👑 الفائز":"فائز "+label):"المركز "+(i+1)}: </span><span class="w-name">${r[0]}</span><span style="color:var(--gold2);margin:0 6px">${fmt(r[1])}</span>${i===0&&isT?cdH:""}${i<ranked.length-1?'<span class="w-sep">✦</span>':""}</div>`).join("");
  return`<div class="winner-banner">${items}</div>`;
}
