<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>نظام مبيعات البسفور - المطور</title>
<style>
/* المتغيرات والتصميم العصري */
:root {
  --bg-primary: #0a0a16;
  --card-bg-gradient: linear-gradient(135deg, #1b1b35, #14142a);
  --accent-purple: #7c3aed;
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  --border-color: rgba(255, 255, 255, 0.08);
  --input-bg: rgba(255, 255, 255, 0.05);
  --color-success: #10B981;
  --color-danger: #EF4444;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
body{background:var(--bg-primary);color:var(--text-primary);direction:rtl;padding-bottom:80px}

/* الهيدر */
.header{padding:18px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-color);background:rgba(10,10,22,0.8);backdrop-filter:blur(10px);sticky:top;z-index:90}
.logo{font-size:18px;font-weight:900}
.logo span{color:var(--accent-purple)}

/* بانر الفائز */
.winner-banner{background:linear-gradient(90deg,#7c3aed,#db2777,#7c3aed);padding:12px;text-align:center;font-weight:bold;font-size:14px}

/* البطاقات */
.main-card{background:var(--card-bg-gradient);border-radius:20px;padding:20px;margin:15px;border:1px solid var(--border-color)}
.amount-box{text-align:center;margin:20px 0}
.amount-box h1{font-size:40px;color:#fff}

/* المدخلات */
.inp-group{margin-bottom:15px}
.lbl{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:5px}
.inp{width:100%;padding:12px;border-radius:10px;background:var(--input-bg);border:1px solid var(--border-color);color:#fff;outline:none}
.inp:focus{border-color:var(--accent-purple)}

/* الأزرار */
.btn-primary{width:100%;padding:15px;background:var(--accent-purple);border:none;border-radius:10px;color:#fff;font-weight:bold;cursor:pointer}
.btn-secondary{padding:8px 15px;background:var(--input-bg);color:var(--text-secondary);border:1px solid var(--border-color);border-radius:8px;cursor:pointer}

/* النافبار السفلي */
.bottom-nav{position:fixed;bottom:0;width:100%;height:70px;background:rgba(10,10,22,0.9);display:flex;justify-content:space-around;align-items:center;border-top:1px solid var(--border-color)}
.nav-item{color:var(--text-secondary);text-align:center;font-size:12px;cursor:pointer}
.nav-item.active{color:var(--accent-purple)}

/* الجداول */
table{width:100%;border-collapse:collapse;margin-top:15px}
th{text-align:right;color:var(--text-secondary);font-size:12px;padding:10px}
td{padding:12px;border-bottom:1px solid var(--border-color);font-size:13px}

/* شاشة تسجيل الدخول */
.login-wrap{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
</style>
</head>
<body>

<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

// !!! ضع معلومات الـ Firebase الخاصة بك هنا لكي تعمل سحب البيانات !!!
const firebaseConfig = {
  apiKey: "AIzaSyAsllnjBZO4K9MyJNiTFoQJSfKtycQHMtU",
  authDomain: "bosphorus-76067.firebaseapp.com",
  projectId: "bosphorus-76067",
  storageBucket: "bosphorus-76067.firebasestorage.app",
  messagingSenderId: "678947739557",
  appId: "1:678947739557:web:f3d70cfc44d862ddf53a4c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// مجموعات البيانات
const salesCol = collection(db, "shop_sales");

// الحالة العامة للنظام
let state = {
  user: null,
  role: null,
  sales: [],
  currentStore: 1,
  saleType: 'store'
};

// الثوابت
const STORES = [
  {id:1, name:"محل 1", icon:"🏬"},
  {id:2, name:"محل 2", icon:"🏪"},
  {id:3, name:"محل 3", icon:"🛒"}
];
const EMP_PASS = {"عمار":"111", "جعفر":"222", "مثنى":"333", "نورة":"444"};

// سحب البيانات المباشر
onSnapshot(query(salesCol, orderBy("createdAt", "desc")), (snap) => {
  state.sales = snap.docs.map(d => ({id: d.id, ...d.data()}));
  render();
});

// وظائف النظام
window.login = () => {
  const pass = document.getElementById('login-pass').value;
  if(pass === "0000") { state.user = "المالك"; state.role = "owner"; }
  else {
    for(const [name, p] of Object.entries(EMP_PASS)){
      if(pass === p) { state.user = name; state.role = "employee"; break; }
    }
  }
  if(state.user) render(); else alert("خطأ في الرمز");
};

window.addSale = async () => {
  const amt = document.getElementById('sale-amt').value;
  if(!amt) return alert("أدخل المبلغ");
  await addDoc(salesCol, {
    amount: Number(amt),
    emp: state.user,
    store: state.currentStore,
    type: state.saleType,
    time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}),
    date: new Date().toLocaleDateString('en-CA'),
    createdAt: serverTimestamp()
  });
  document.getElementById('sale-amt').value = "";
};

window.switchTab = (storeId) => { state.currentStore = storeId; render(); };
window.setSaleType = (type) => { state.saleType = type; render(); };

// رسم الواجهة
function render() {
  const root = document.getElementById('app');
  if(!state.user) {
    root.innerHTML = `
      <div class="login-wrap">
        <h1 style="margin-bottom:20px">البسفور 👑</h1>
        <div class="inp-group" style="width:100%; max-width:300px">
          <input id="login-pass" class="inp" type="password" placeholder="أدخل رمز الدخول">
        </div>
        <button class="btn-primary" style="max-width:300px" onclick="window.login()">دخول</button>
      </div>`;
    return;
  }

  const store = STORES.find(s => s.id === state.currentStore);
  const todaySales = state.sales.filter(s => s.date === new Date().toLocaleDateString('en-CA') && s.store === state.currentStore);
  const total = todaySales.reduce((sum, s) => sum + s.amount, 0);

  root.innerHTML = `
    <div class="winner-banner">👑 نظام مبيعات البسفور - أهلاً ${state.user}</div>
    <div class="header">
      <div class="logo">مبيعات <span>البسفور</span></div>
      <button class="btn-secondary" onclick="location.reload()">خروج</button>
    </div>

    <div class="main-card">
      <div class="amount-box">
        <span class="lbl">إجمالي مبيعات ${store.name}</span>
        <h1>${total.toLocaleString()} <small style="font-size:15px">د.ع</small></h1>
      </div>
      
      <div class="inp-group">
        <div style="display:flex; gap:10px; margin-bottom:15px">
          <button class="btn-secondary" style="flex:1; border-color:${state.saleType==='store'?'#7c3aed':''}" onclick="window.setSaleType('store')">المحل</button>
          <button class="btn-secondary" style="flex:1; border-color:${state.saleType==='delivery'?'#7c3aed':''}" onclick="window.setSaleType('delivery')">توصيل</button>
        </div>
        <input id="sale-amt" class="inp" type="number" placeholder="أدخل مبلغ المبيع">
      </div>
      <button class="btn-primary" onclick="window.addSale()">تأكيد المبيع</button>
    </div>

    <div class="main-card">
      <span class="lbl">آخر العمليات</span>
      <table>
        <thead><tr><th>الوقت</th><th>النوع</th><th>المبلغ</th></tr></thead>
        <tbody>
          ${todaySales.slice(0,5).map(s => `
            <tr>
              <td>${s.time}</td>
              <td>${s.type === 'store' ? '🏬' : '🚚'}</td>
              <td style="font-weight:bold">${s.amount.toLocaleString()}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <div class="bottom-nav">
      ${STORES.map(s => `
        <div class="nav-item ${state.currentStore === s.id ? 'active' : ''}" onclick="window.switchTab(${s.id})">
          <div style="font-size:20px">${s.icon}</div>
          <div>${s.name}</div>
        </div>
      `).join('')}
    </div>
  `;
}

render();
</script>
</body>
</html>
