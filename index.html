<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>نظام مبيعات البسفور</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;background:#0d0d1a;color:#e8e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid #2a2a4a;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-size:18px;font-weight:900;color:#fff}.logo span{color:#a78bfa}
.date-badge{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:10px;padding:5px 12px;font-size:12px;color:#8888aa}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #2a2a4a}
.dot{width:8px;height:8px;border-radius:50%}
.dot-green{background:#10B981;animation:pulse 2s infinite}.dot-yellow{background:#F59E0B}.dot-red{background:#EF4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.winner-banner{background:linear-gradient(90deg,#7c3aed,#a78bfa,#e040fb,#a78bfa,#7c3aed);background-size:300% 100%;animation:gradMove 4s linear infinite;padding:14px 20px;border-bottom:2px solid #a78bfa55;width:100%;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;text-align:center}
@keyframes gradMove{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.winner-fixed-item{display:inline-flex;align-items:center;gap:10px;font-size:15px;font-weight:800;color:#fff;white-space:nowrap}
.winner-crown{font-size:22px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.tabs{display:flex;background:#1a1a2e;border-bottom:1px solid #2a2a4a;padding:0 16px;overflow-x:auto}
.tab{padding:13px 16px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:#8888aa;transition:all .2s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;position:relative}
.tab.active{color:#a78bfa;border-bottom-color:#a78bfa}
.notif-badge{position:absolute;top:8px;right:8px;background:#EF4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.main{max-width:1100px;margin:0 auto;padding:22px 14px}
.stores-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
@media(max-width:650px){.stores-grid,.report-grid,.wallet-grid{grid-template-columns:1fr!important}.pos-row{grid-template-columns:1fr!important}.type-tabs,.filter-row{flex-direction:column}}
.store-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:16px;padding:16px;cursor:pointer;transition:all .2s;position:relative}
.store-card:hover{transform:translateY(-2px)}.store-card.selected{border-color:#a78bfa;box-shadow:0 0 20px #a78bfa33}
.sel-dot{position:absolute;top:10px;left:10px;width:9px;height:9px;border-radius:50%;background:#a78bfa;display:none}
.store-card.selected .sel-dot{display:block}
.s-icon{font-size:26px;margin-bottom:6px}.s-name{font-weight:900;font-size:14px}.s-sub{font-size:11px;color:#8888aa;margin-top:2px}
.s-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
.s-mini{background:#0d0d1a;border-radius:7px;padding:5px 8px}
.s-mini-lbl{font-size:10px;color:#8888aa}.s-mini-val{font-size:12px;font-weight:700;margin-top:2px}
.s-total{margin-top:7px;font-size:14px;font-weight:900;border-top:1px solid #2a2a4a;padding-top:7px}
.pos-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:16px;padding:20px}
.pos-title{font-weight:900;font-size:15px;margin-bottom:14px}
.type-tabs{display:flex;gap:8px;margin-bottom:18px}
.type-tab{flex:1;padding:11px;border-radius:11px;border:2px solid #2a2a4a;background:#0d0d1a;color:#8888aa;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.type-tab.active-store{border-color:#a78bfa;background:#a78bfa18;color:#a78bfa}
.type-tab.active-delivery{border-color:#38bdf8;background:#38bdf818;color:#38bdf8}
.pos-row{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-bottom:12px;align-items:end}
.lbl{font-size:12px;color:#8888aa;margin-bottom:5px}
.inp{width:100%;padding:10px 13px;border-radius:10px;border:1px solid #2a2a4a;background:#0d0d1a;color:#e8e8f0;font-family:inherit;font-size:13px;outline:none}
.inp:focus{border-color:#a78bfa}
.btn{padding:10px 16px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff}
.btn-g{background:#1a1a2e;border:1px solid #2a2a4a;color:#8888aa}
.btn-red{background:linear-gradient(135deg,#EF4444,#dc2626);color:#fff}
.btn-green{background:linear-gradient(135deg,#10B981,#059669);color:#fff}
.btn-yellow{background:linear-gradient(135deg,#F59E0B,#d97706);color:#fff}
.btn-edit{background:#F59E0B15;border:1px solid #F59E0B44;color:#F59E0B;border-radius:7px;padding:4px 9px;cursor:pointer;font-size:11px}
.btn-del{background:#EF444415;border:1px solid #EF444433;color:#EF4444;border-radius:7px;padding:4px 9px;cursor:pointer;font-size:11px}
.sale-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.sum-box{background:#0d0d1a;border-radius:11px;padding:11px 13px;border:1px solid #2a2a4a}
.sum-lbl{font-size:11px;color:#8888aa;margin-bottom:3px}.sum-val{font-size:15px;font-weight:900}
table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}
th{padding:9px 11px;text-align:right;color:#8888aa;border-bottom:1px solid #2a2a4a}
td{padding:9px 11px;border-bottom:1px solid #2a2a4a22;vertical-align:middle}
tr:hover td{background:#ffffff05}
.type-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-store{background:#a78bfa18;border:1px solid #a78bfa44;color:#a78bfa}
.badge-delivery{background:#38bdf818;border:1px solid #38bdf844;color:#38bdf8}
.overlay{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:20px;width:100%;max-width:440px;padding:26px;max-height:90vh;overflow-y:auto}
.modal-title{font-weight:900;font-size:16px;margin-bottom:20px}
.form-row{margin-bottom:13px}
.form-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.filter-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:16px;padding:18px;margin-bottom:22px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn{padding:8px 14px;border-radius:9px;border:2px solid #2a2a4a;background:#0d0d1a;color:#8888aa;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.filter-btn.active{border-color:#a78bfa;background:#a78bfa;color:#fff}
.date-btn{padding:8px 14px;border-radius:9px;border:2px solid #2a2a4a;background:#0d0d1a;color:#8888aa;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.date-btn.active{border-color:#a78bfa;background:#a78bfa;color:#fff}
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.rcard{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:18px;text-align:center;border:1px solid #2a2a4a}
.rcard-split{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.rcard-mini{background:#0d0d1a;border-radius:7px;padding:7px}
.total-banner{background:linear-gradient(135deg,#7c3aed22,#a78bfa22);border:1px solid #a78bfa44;border-radius:14px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.chart-box,.detail-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:14px;padding:20px;margin-bottom:18px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.bar-lbl{width:65px;font-size:12px;font-weight:700;text-align:right}
.bar-track{flex:1;height:30px;background:#0d0d1a;border-radius:7px;overflow:hidden;position:relative}
.bar-val{width:110px;font-size:11px;font-weight:700;text-align:left}
.wallet-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.wallet-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:18px;padding:20px}
.wc-name{font-size:15px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.wc-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2a2a4a22}
.wc-lbl{font-size:12px;color:#8888aa}.wc-val{font-size:18px;font-weight:900}
.wc-actions{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.wc-btn{flex:1;padding:8px 6px;border-radius:9px;border:none;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;min-width:60px;text-align:center}
.tx-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.tx-salary{background:#10B98118;border:1px solid #10B98144;color:#10B981}
.tx-points{background:#F59E0B18;border:1px solid #F59E0B44;color:#F59E0B}
.tx-withdraw{background:#EF444418;border:1px solid #EF444444;color:#EF4444}
.tx-convert{background:#a78bfa18;border:1px solid #a78bfa44;color:#a78bfa}
.tx-add{background:#10B98118;border:1px solid #10B98144;color:#10B981}
.tx-reset{background:#EF444418;border:1px solid #EF444444;color:#EF4444}
.emp-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;width:100%;background:#1a1a2e;border:1px solid #a78bfa55;border-radius:12px;overflow:hidden;z-index:50;box-shadow:0 8px 24px #0008}
.emp-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px}
.emp-item:hover{background:#a78bfa22}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:24px;padding:36px;width:100%;max-width:380px;text-align:center}
.login-inp{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #2a2a4a;background:#0d0d1a;color:#e8e8f0;font-family:inherit;font-size:16px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:12px}
.login-inp:focus{border-color:#a78bfa}
.login-btn{width:100%;padding:12px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;margin-bottom:10px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px}
.spinner{width:34px;height:34px;border:3px solid #2a2a4a;border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.notif-item{padding:14px;border-radius:12px;border:1px solid #2a2a4a;background:#0d0d1a;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.notif-unread{border-color:#a78bfa55;background:#a78bfa08}
.notif-dot{width:8px;height:8px;border-radius:50%;background:#a78bfa;margin-top:5px;flex-shrink:0}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
select option{background:#1a1a2e}
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><div style="color:#8888aa">جاري الاتصال...</div></div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,addDoc,deleteDoc,updateDoc,setDoc,doc,serverTimestamp,query,orderBy,getDoc}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyAsllnjBZO4K9MyJNiTFoQJSfKtycQHMtU",authDomain:"bosphorus-76067.firebaseapp.com",projectId:"bosphorus-76067",storageBucket:"bosphorus-76067.firebasestorage.app",messagingSenderId:"678947739557",appId:"1:678947739557:web:f3d70cfc44d862ddf53a4c"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const salesCol=collection(db,"shop_sales");
const walletsCol=collection(db,"wallets");
const txCol=collection(db,"wallet_tx");
const attendCol=collection(db,"attendance");
const notifsCol=collection(db,"notifications");

const STORES=[{id:1,name:“محل 1”,icon:“🏬”,color:”#a78bfa”},{id:2,name:“محل 2”,icon:“🏪”,color:”#10B981”},{id:3,name:“محل 3”,icon:“🛍️”,color:”#F59E0B”}];
const EMPS=[[“عمار”,“👨‍💼”],[“جعفر”,“👨‍💼”],[“مثنى”,“👨‍💼”],[“نوره”,“👩‍💼”]];
const EMP_PASS={“عمار”:“111”,“جعفر”:“222”,“مثنى”:“333”,“نوره”:“444”};

// ✅ إصلاح 1: مثنى أصبح محل 2
const EMP_STORE={“عمار”:1,“نوره”:2,“جعفر”:3,“مثنى”:2};

const SALARIES={“عمار”:200000,“جعفر”:250000,“مثنى”:250000,“نوره”:200000};
const EMP_ICONS={“عمار”:“👨‍💼”,“جعفر”:“👨‍💼”,“مثنى”:“👨‍💼”,“نوره”:“👩‍💼”};
const EMP_COLORS={“عمار”:”#a78bfa”,“جعفر”:”#10B981”,“مثنى”:”#38bdf8”,“نوره”:”#F59E0B”};
const PASS={owner:“0000”};
const POINTS_PER_WIN=5;
const POINT_VALUE=1000;
const WORK_START=“12:00”;
const SHOP_LAT=33.31033;
const SHOP_LNG=44.32380;
const MAX_DISTANCE=100;

function today(){return new Date().toLocaleDateString(“en-CA”);}
function fmt(n){return Number(n||0).toLocaleString(“en-IQ”)+” د.ع”;}
function fmtPts(n){return Number(n||0)+” نقطة”;}
function calcDistance(lat1,lon1,lat2,lon2){const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function timeToMins(t){const[h,m]=t.split(”:”).map(Number);return h*60+m;}
function getWeekStart(){const d=new Date(),day=d.getDay(),diff=d.getDate()-((day+6)%7);const mon=new Date(d);mon.setDate(diff);return mon.toLocaleDateString(“en-CA”);}

let S={
loggedIn:false,role:null,empName:null,
tab:“pos”,sel:1,saleType:“store”,
sales:[],wallets:{},txs:[],attendance:[],notifs:[],
empSel:””,loaded:false,
editId:null,editSaleId:null,
repFrom:today(),repTo:today(),repStore:“all”,repType:“all”,repPeriod:“today”,
modal:null,gpsLoading:false,pendingNotif:null
};

function setSyncUI(s){const dot=document.getElementById(“sync-dot”),txt=document.getElementById(“sync-txt”);if(!dot||!txt)return;if(s===“ok”){dot.className=“dot dot-green”;txt.textContent=“متصل”;}else if(s===“saving”){dot.className=“dot dot-yellow”;txt.textContent=“جاري الحفظ…”;}else{dot.className=“dot dot-red”;txt.textContent=“غير متصل”;}}

// ===== Listeners =====
onSnapshot(query(salesCol,orderBy(“createdAt”,“desc”)),snap=>{
S.sales=snap.docs.map(d=>({…d.data(),id:d.id}));
S.loaded=true;
setSyncUI(“ok”);

// ✅ إصلاح 2: تحقق من اكتمال التسجيل وأعطِ النقاط للأعلى مبيع
const td=today();
const todayStoreSales=S.sales.filter(x=>x.date===td&&x.type===“store”);
const storesNow=new Set(todayStoreSales.map(x=>x.store));
const allReady=STORES.every(s=>storesNow.has(s.id));

if(allReady&&!countdownInterval&&countdownSecs===0){
getDoc(doc(db,“winners”,`winner_${td}`)).then(ws=>{
if(!ws.exists()) startCountdown();
});
}
render();
},()=>setSyncUI(“error”));

onSnapshot(walletsCol,snap=>{S.wallets={};snap.docs.forEach(d=>{S.wallets[d.id]={…d.data(),id:d.id};});render();});
onSnapshot(query(txCol,orderBy(“createdAt”,“desc”)),snap=>{S.txs=snap.docs.map(d=>({…d.data(),id:d.id}));render();});
onSnapshot(query(attendCol,orderBy(“createdAt”,“desc”)),snap=>{S.attendance=snap.docs.map(d=>({…d.data(),id:d.id}));render();});
onSnapshot(query(notifsCol,orderBy(“createdAt”,“desc”)),snap=>{
S.notifs=snap.docs.map(d=>({…d.data(),id:d.id}));
if(S.loggedIn&&S.empName&&!S.pendingNotif){
const unread=S.notifs.find(n=>n.type===“broadcast”&&!(n.readBy||{})[S.empName]);
if(unread)S.pendingNotif=unread;
}
render();
});

async function initWallets(){for(const[name]of EMPS){const ref=doc(db,“wallets”,name);const snap=await getDoc(ref);if(!snap.exists())await setDoc(ref,{name,balance:0,points:0,createdAt:serverTimestamp()});}}
initWallets();

// ===== Auth =====
function tryLogin(){
const pass=document.getElementById(“pass-inp”).value.trim();
const err=document.getElementById(“login-err”);
if(pass===PASS.owner){S.loggedIn=true;S.role=“owner”;S.empName=null;render();return;}
for(const[name,p]of Object.entries(EMP_PASS)){
if(pass===p){
S.loggedIn=true;S.role=“employee”;S.empName=name;S.empSel=name;S.tab=“pos”;
const unread=S.notifs.find(n=>n.type===“broadcast”&&!(n.readBy||{})[name]);
if(unread)S.pendingNotif=unread;
render();return;
}
}
err.textContent=“❌ كلمة المرور غلط”;document.getElementById(“pass-inp”).value=””;
}
function logout(){S.loggedIn=false;S.role=null;S.empName=null;S.empSel=””;S.tab=“pos”;S.pendingNotif=null;render();}

// ===== Sales =====
async function addSale(){
const amt=parseFloat(document.getElementById(“inp-amount”)?.value);
if(!amt||amt<=0){alert(“أدخل مبلغ صحيح!”);return;}
if(!S.empSel){alert(“اختر اسم الموظف!”);return;}
const now=new Date();
setSyncUI(“saving”);
await addDoc(salesCol,{
store:S.sel,amount:amt,emp:S.empSel,type:S.saleType,
date:today(),time:now.toLocaleTimeString(“en”,{hour:“2-digit”,minute:“2-digit”}),
createdAt:serverTimestamp()
});
document.getElementById(“inp-amount”).value=””;
// ملاحظة: النقاط تُحسب تلقائياً عبر onSnapshot بعد اكتمال الكل
}

async function delSale(id){if(S.role!==“owner”)return;if(!confirm(“حذف المبيعة؟”))return;await deleteDoc(doc(db,“shop_sales”,id));}

async function saveEdit(){
const amt=parseFloat(document.getElementById(“edit-amount”)?.value);
const emp=document.getElementById(“edit-emp”)?.value;
const type=document.getElementById(“edit-type”)?.value;
const store=parseInt(document.getElementById(“edit-store”)?.value);
if(!amt||amt<=0){alert(“أدخل مبلغ صحيح!”);return;}
await updateDoc(doc(db,“shop_sales”,S.editId),{amount:amt,emp,type,store});
S.editId=null;S.modal=null;render();
}

async function saveSaleEdit(){
const newDate=document.getElementById(“se-date”)?.value;
const newAmt=parseFloat(document.getElementById(“se-amount”)?.value);
if(!newDate){alert(“اختر تاريخ!”);return;}
if(!newAmt||newAmt<=0){alert(“أدخل مبلغ صحيح!”);return;}
if(!confirm(“تعديل المبيعة؟”))return;
setSyncUI(“saving”);
await updateDoc(doc(db,“shop_sales”,S.editSaleId),{date:newDate,amount:newAmt});
S.editSaleId=null;S.modal=null;render();
alert(“✅ تم تعديل المبيعة”);
}

// ===== ✅ إصلاح 2: النقاط للأعلى مبيع بعد اكتمال الجميع =====
// هذه الدالة تُستدعى فقط من onSnapshot بعد ما يكتمل تسجيل كل المحلات
async function checkAndAwardPoints(){
const td=today();

// تحقق إن ما أُعطيت النقاط اليوم
const winnerRef=doc(db,“winners”,`winner_${td}`);
const winnerSnap=await getDoc(winnerRef);
if(winnerSnap.exists()) return; // النقاط أُعطيت مسبقاً

});

const weekStart=getWeekStart();
const weekPoints=S.txs.filter(x=>x.emp===winner&&x.type===“points”&&x.amount>0&&x.date>=weekStart)

await updateDoc(wRef,{points:(wSnap.data().points||0)+POINTS_PER_WIN});

});

});
}
}

// عداد تنازلي — يبدأ بعد اكتمال التسجيل، ثم يعطي النقاط
let countdownInterval=null;
let countdownSecs=0;

function startCountdown(){
countdownSecs=5*60; // 5 دقائق
if(countdownInterval) clearInterval(countdownInterval);
countdownInterval=setInterval(async()=>{
countdownSecs–;
if(countdownSecs<=0){
clearInterval(countdownInterval);
countdownInterval=null;
countdownSecs=0;
// ✅ أعطِ النقاط للأعلى مبيع الآن
await checkAndAwardPoints();
}
const el=document.getElementById(“countdown-el”);
if(el){
if(countdownSecs>0){
const m=Math.floor(countdownSecs/60),s=countdownSecs%60;
el.textContent=`⏳ النقاط تُضاف للأعلى مبيع بعد ${m}:${String(s).padStart(2,"0")}`;
} else {
el.textContent=“🏆 جاري احتساب الفائز…”;
}
}
},1000);
}

async function deleteTx(id){
if(!confirm(“حذف هذه المعاملة وعكس تأثيرها على الرصيد؟”))return;
const tx=S.txs.find(x=>x.id===id);if(!tx)return;
const wRef=doc(db,“wallets”,tx.emp);
const wSnap=await getDoc(wRef);if(!wSnap.exists())return;
const w=wSnap.data();
if(tx.type===“salary”||tx.type===“add”){
await updateDoc(wRef,{balance:Math.max(0,(w.balance||0)-tx.amount)});
} else if(tx.type===“withdraw”){
await updateDoc(wRef,{balance:(w.balance||0)+tx.amount});
} else if(tx.type===“points”){
if(tx.amount>0){await updateDoc(wRef,{points:Math.max(0,(w.points||0)-tx.amount)});}
else{await updateDoc(wRef,{points:(w.points||0)+Math.abs(tx.amount)});}
} else if(tx.type===“convert”){
const ptsBack=Math.round(tx.amount/POINT_VALUE);
await updateDoc(wRef,{balance:Math.max(0,(w.balance||0)-tx.amount),points:(w.points||0)+ptsBack});
}
await deleteDoc(doc(db,“wallet_tx”,id));
}

function storeSums(storeId,from,to){
const items=S.sales.filter(x=>x.store===storeId&&x.date>=from&&x.date<=to);
const shop=items.filter(x=>x.type===“store”).reduce((a,b)=>a+b.amount,0);
const del=items.filter(x=>x.type===“delivery”).reduce((a,b)=>a+b.amount,0);
return{shop,del,total:shop+del,count:items.length,items};
}

return`<div style="max-width:480px;margin:0 auto"> <div class="wallet-card" style="border-color:${c}55;margin-bottom:20px"> <div style="text-align:center;margin-bottom:20px"> <div style="font-size:48px">${icon}</div> <div style="font-size:20px;font-weight:900;color:${c};margin-top:8px">${empName}</div> <div style="font-size:12px;color:#8888aa">محفظتي الشخصية</div> </div> <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px"> <div style="background:#0d0d1a;border-radius:14px;padding:18px;text-align:center;border:1px solid ${c}44"> <div style="font-size:12px;color:#8888aa;margin-bottom:6px">💰 رصيدي</div> <div style="font-size:22px;font-weight:900;color:${c}">${fmt(w.balance||0)}</div> </div> <div style="background:#0d0d1a;border-radius:14px;padding:18px;text-align:center;border:1px solid #F59E0B44"> <div style="font-size:12px;color:#8888aa;margin-bottom:6px">🏅 نقاطي</div> <div style="font-size:22px;font-weight:900;color:#F59E0B">${w.points||0}</div> <div style="font-size:11px;color:#8888aa;margin-top:4px">= ${fmt((w.points||0)*POINT_VALUE)}</div> </div> </div> <div style="display:flex;gap:10px"> <button class="btn btn-yellow" style="flex:1" onclick="window._convert('${empName}')">🎯 تحويل نقاط</button> <button class="btn" style="flex:1;background:#38bdf815;border:1px solid #38bdf844;color:#38bdf8" onclick="window._openWithdraw('${empName}')">💸 طلب سلفة</button> </div> </div> <div class="detail-box"> <div style="font-weight:700;margin-bottom:14px;font-size:14px">📋 سجل المعاملات</div> ${myTxs.length===0?`<div style="text-align:center;padding:30px;color:#555577">لا توجد معاملات</div>`:`<table><thead><tr><th>التاريخ</th><th>النوع</th><th>المبلغ</th></tr></thead><tbody>${txRows}</tbody></table>`}
</div>

  </div>`;
}

function renderMyAttend(empName){
const c=EMP_COLORS[empName]||”#a78bfa”;const td=today();
const todayRec=S.attendance.find(x=>x.emp===empName&&x.date===td);
const myRecs=[…S.attendance.filter(x=>x.emp===empName)].sort((a,b)=>b.date.localeCompare(a.date));
const statusBox=todayRec
?todayRec.punchOut
?`<div style="background:#10B98118;border:1px solid #10B98144;border-radius:14px;padding:18px;text-align:center;margin-bottom:20px"><div style="font-size:32px;margin-bottom:8px">✅</div><div style="font-weight:700;color:#10B981;font-size:16px">اكتمل دوامك اليوم</div><div style="font-size:13px;color:#8888aa;margin-top:6px">حضور: ${todayRec.punchIn} — خروج: ${todayRec.punchOut}</div><div style="font-size:13px;color:#10B981;margin-top:4px">⏱ ${todayRec.hours} ساعة</div></div>`
:`<div style="background:#F59E0B18;border:1px solid #F59E0B44;border-radius:14px;padding:18px;text-align:center;margin-bottom:20px"><div style="font-size:32px;margin-bottom:8px">⏳</div><div style="font-weight:700;color:#F59E0B;font-size:16px">أنت في الدوام الآن</div><div style="font-size:13px;color:#8888aa;margin-top:6px">بصمة الحضور: ${todayRec.punchIn}</div>${todayRec.lateBy>0?`<div style="font-size:12px;color:#EF4444;margin-top:4px">⚠️ متأخر ${todayRec.lateBy} دقيقة</div>`:`<div style="font-size:12px;color:#10B981;margin-top:4px">🟢 في الوقت</div>`}</div>`
:`<div style="background:#EF444418;border:1px solid #EF444444;border-radius:14px;padding:18px;text-align:center;margin-bottom:20px"><div style="font-size:32px;margin-bottom:8px">📍</div><div style="font-weight:700;color:#EF4444;font-size:16px">لم تسجل حضورك اليوم بعد</div><div style="font-size:12px;color:#8888aa;margin-top:6px">وقت الدوام: ${WORK_START} — 22:00</div></div>`;
const rows=myRecs.slice(0,14).map(r=>`<tr> <td style="color:#8888aa;font-size:12px">${r.date}</td> <td style="color:#10B981;font-weight:700">${r.punchIn||"—"} ${r.lateBy>0?`<span style="color:#EF4444;font-size:11px">+${r.lateBy}د</span>`:`<span style="color:#10B981;font-size:11px">✓</span>`}</td>
<td style="color:#a78bfa;font-weight:700">${r.punchOut||”—”}</td>
<td>${r.hours!=null?r.hours+” س”:”—”}</td>

  </tr>`).join("");
  const totalDays=myRecs.filter(x=>x.punchOut).length;
  const totalHours=myRecs.filter(x=>x.hours).reduce((a,b)=>a+(b.hours||0),0);
  const lateDays=myRecs.filter(x=>x.lateBy>0).length;
  return`<div style="max-width:500px;margin:0 auto">
    <div style="font-size:16px;font-weight:900;margin-bottom:16px;color:${c}">📍 سجل حضوري — ${empName}</div>
    ${statusBox}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <button class="btn btn-green" style="padding:16px;font-size:15px;border-radius:14px" onclick="window._punchIn()" ${S.gpsLoading?"disabled":""}>
        ${S.gpsLoading?"⏳ جاري...":"📍 بصمة حضور"}</button>
      <button class="btn btn-red" style="padding:16px;font-size:15px;border-radius:14px" onclick="window._punchOut()" ${S.gpsLoading?"disabled":""}>
        ${S.gpsLoading?"⏳ جاري...":"🚪 بصمة خروج"}</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
      <div class="sum-box" style="text-align:center"><div class="sum-lbl">📅 أيام</div><div class="sum-val" style="color:#10B981">${totalDays}</div></div>
      <div class="sum-box" style="text-align:center"><div class="sum-lbl">⏱ ساعات</div><div class="sum-val" style="color:${c}">${Math.round(totalHours*10)/10}</div></div>
      <div class="sum-box" style="text-align:center"><div class="sum-lbl">⚠️ تأخير</div><div class="sum-val" style="color:#EF4444">${lateDays}</div></div>
    </div>
    <div class="detail-box">
      <div style="font-weight:700;margin-bottom:12px;font-size:14px">📋 سجل الحضور</div>
      ${myRecs.length===0?`<div style="text-align:center;padding:30px;color:#555577">لا يوجد سجل</div>`:`<table><thead><tr><th>التاريخ</th><th>حضور</th><th>خروج</th><th>الساعات</th></tr></thead><tbody>${rows}</tbody></table>`}
    </div>
  </div>`;
}

function renderAttendAdmin(){
const td=today();
const todayCards=EMPS.map(([name,icon])=>{
const c=EMP_COLORS[name]||”#a78bfa”;const rec=S.attendance.find(x=>x.emp===name&&x.date===td);
let status,statusColor,detail;
if(!rec){status=“غائب”;statusColor=”#EF4444”;detail=“لم يسجل حضور”;}
else if(!rec.punchOut){status=“في الدوام”;statusColor=”#F59E0B”;detail=`حضر: ${rec.punchIn}${rec.lateBy>0?` (متأخر ${rec.lateBy}د)`:""}`;}
else{status=“انصرف”;statusColor=”#10B981”;detail=`${rec.punchIn} — ${rec.punchOut} | ${rec.hours}س`;}
return`<div class="sum-box" style="border-color:${c}44"> <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"> <span style="font-weight:700;color:${c}">${icon} ${name}</span> <span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:${statusColor}18;border:1px solid ${statusColor}44;color:${statusColor}">${status}</span> </div> <div style="font-size:12px;color:#8888aa">${detail}</div> </div>`;
}).join(””);
const empStats=EMPS.map(([name,icon])=>{
const c=EMP_COLORS[name]||”#a78bfa”;
const recs=S.attendance.filter(x=>x.emp===name&&x.punchOut);
const totalH=recs.reduce((a,b)=>a+(b.hours||0),0);
const late=S.attendance.filter(x=>x.emp===name&&x.lateBy>0).length;
return`<div class="sum-box" style="border-color:${c}33"> <div style="font-weight:700;color:${c};margin-bottom:8px">${icon} ${name}</div> <div style="font-size:12px;color:#8888aa">أيام: <b style="color:#e8e8f0">${recs.length}</b></div> <div style="font-size:12px;color:#8888aa">ساعات: <b style="color:${c}">${Math.round(totalH*10)/10}</b></div> <div style="font-size:12px;color:#8888aa">تأخير: <b style="color:#EF4444">${late}</b></div> </div>`;
}).join(””);
const allRecs=[…S.attendance].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,50);
const rows=allRecs.map(r=>{
const c=EMP_COLORS[r.emp]||”#a78bfa”;
return`<tr> <td style="color:#8888aa;font-size:11px">${r.date}</td> <td style="font-weight:700;color:${c}">${r.emp}</td> <td style="color:#10B981">${r.punchIn||"—"} ${r.lateBy>0?`<span style="color:#EF4444;font-size:11px">+${r.lateBy}د</span>`:`<span style="color:#10B981;font-size:11px">✓</span>`}</td> <td style="color:#a78bfa">${r.punchOut||"⏳"}</td> <td>${r.hours!=null?r.hours+" س":"—"}</td> </tr>`;
}).join(””);
return` <div style="font-size:16px;font-weight:900;margin-bottom:16px">📍 متابعة الحضور</div> <div style="font-size:13px;color:#8888aa;margin-bottom:12px">حالة اليوم — ${td}</div> <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px">${todayCards}</div> <div style="font-size:14px;font-weight:700;margin-bottom:12px">📊 إحصائيات</div> <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px">${empStats}</div> <div class="detail-box"> <div style="font-weight:700;margin-bottom:14px;font-size:14px">📋 سجل الحضور</div> ${allRecs.length===0?`<div style="text-align:center;padding:30px;color:#555577">لا يوجد سجل</div>`:`<table><thead><tr><th>التاريخ</th><th>الموظف</th><th>حضور</th><th>خروج</th><th>الساعات</th></tr></thead><tbody>${rows}</tbody></table>`} </div>`;
}

function renderReport(){
let filtered=S.sales.filter(x=>x.date>=S.repFrom&&x.date<=S.repTo);
if(S.repStore!==“all”)filtered=filtered.filter(x=>x.store===S.repStore);
if(S.repType!==“all”)filtered=filtered.filter(x=>x.type===S.repType);
const grand=filtered.reduce((a,b)=>a+b.amount,0);
const grandShop=filtered.filter(x=>x.type===“store”).reduce((a,b)=>a+b.amount,0);
const grandDel=filtered.filter(x=>x.type===“delivery”).reduce((a,b)=>a+b.amount,0);
const storeTotals=STORES.map(s=>{
const items=filtered.filter(x=>x.store===s.id);
const shop=items.filter(x=>x.type===“store”).reduce((a,b)=>a+b.amount,0);
const del=items.filter(x=>x.type===“delivery”).reduce((a,b)=>a+b.amount,0);
return{s,shop,del,total:shop+del,count:items.length};
});
const mx=Math.max(…storeTotals.map(x=>x.total),1);
const periodBtns=[{v:“today”,l:“📅 اليوم”},{v:“week”,l:“📅 الأسبوع”},{v:“month”,l:“📅 الشهر”},{v:“all”,l:“📅 الكل”}]
.map(f=>`<button class="date-btn ${S.repPeriod===f.v?"active":""}" onclick="window._setPeriod('${f.v}')">${f.l}</button>`).join(””);
const dateInputs=`<div class="filter-row" style="margin-bottom:12px;align-items:center">
<div><div class="lbl">من</div><input class="inp" type="date" id="date-from" value="${S.repFrom}" style="width:auto" onchange="S.repPeriod='custom';S.repFrom=this.value;window._applyDates()"/></div>
<div style="color:#8888aa;padding-top:22px">←</div>
<div><div class="lbl">إلى</div><input class="inp" type="date" id="date-to" value="${S.repTo}" style="width:auto" onchange="S.repPeriod='custom';S.repTo=this.value;window._applyDates()"/></div>

  </div>`;
  const sBtns=[{v:"all",l:"🏪 الكل"},{v:1,l:"🏬 محل 1"},{v:2,l:"🏪 محل 2"},{v:3,l:"🛍️ محل 3"}]
    .map(f=>`<button class="filter-btn ${S.repStore===f.v?"active":""}" onclick="window._repStore(${JSON.stringify(f.v)})">${f.l}</button>`).join("");
  const tBtns=[{v:"all",l:"📦 الكل"},{v:"store",l:"🏬 محل"},{v:"delivery",l:"🚚 توصيل"}]
    .map(f=>`<button class="filter-btn ${S.repType===f.v?"active":""}" onclick="window._repType('${f.v}')">${f.l}</button>`).join("");
  const rcards=(S.repStore==="all"?storeTotals:storeTotals.filter(x=>x.s.id===S.repStore)).map(({s,shop,del,total,count})=>`
    <div class="rcard" style="border-color:${s.color}44">
      <div style="font-size:24px;margin-bottom:5px">${s.icon}</div>
      <div style="font-size:12px;color:#8888aa;margin-bottom:4px">${s.name}</div>
      <div style="font-size:19px;font-weight:900;color:${s.color}">${fmt(total)}</div>
      <div class="rcard-split">
        <div class="rcard-mini"><div style="font-size:10px;color:#8888aa">🏬</div><div style="font-size:11px;font-weight:700;color:${s.color};margin-top:2px">${fmt(shop)}</div></div>
        <div class="rcard-mini"><div style="font-size:10px;color:#8888aa">🚚</div><div style="font-size:11px;font-weight:700;color:#38bdf8;margin-top:2px">${fmt(del)}</div></div>
      </div>
      <div style="font-size:11px;color:#8888aa;margin-top:6px">${count} فاتورة</div>
    </div>`).join("");
  const bars=storeTotals.filter(x=>S.repStore==="all"||x.s.id===S.repStore).map(({s,shop,del,total})=>{
    const pct=grand>0?Math.round(total/grand*100):0;const w=Math.round(total/mx*100);const wShop=total>0?Math.round(shop/total*100):0;
    return`<div class="bar-row">
      <div class="bar-lbl">${s.icon} ${s.name}</div>
      <div class="bar-track"><div style="height:100%;width:${w}%;display:flex;overflow:hidden;border-radius:7px"><div style="width:${wShop}%;background:${s.color}"></div><div style="flex:1;background:#38bdf8"></div></div><span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:#fff">${pct}%</span></div>
      <div class="bar-val"><span style="color:${s.color}">${fmt(shop)}</span><br/><span style="color:#38bdf8;font-size:11px">${fmt(del)}</span></div>
    </div>`;
  }).join("");
  const detailRows=[...filtered].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,50).map(x=>{
    const st=STORES.find(s=>s.id===x.store)||STORES[0];
    return`<tr><td style="color:#8888aa;font-size:11px">${x.date} ${x.time||""}</td><td>${st.icon} ${st.name}</td><td>${x.emp||"—"}</td><td><span class="type-badge ${x.type==="store"?"badge-store":"badge-delivery"}">${x.type==="store"?"🏬":"🚚"}</span></td><td style="font-weight:700;color:${x.type==="store"?st.color:"#38bdf8"}">${fmt(x.amount)}</td></tr>`;
  }).join("");
  return`
    <div class="filter-box">
      <div style="font-weight:700;font-size:14px;margin-bottom:14px">🔍 فلترة التقرير</div>
      <div class="lbl" style="margin-bottom:8px">الفترة الزمنية</div>
      <div class="filter-row" style="margin-bottom:14px">${periodBtns}</div>
      ${dateInputs}
      <div class="lbl" style="margin-bottom:7px">المحل</div>
      <div class="filter-row" style="margin-bottom:12px">${sBtns}</div>
      <div class="lbl" style="margin-bottom:7px">النوع</div>
      <div class="filter-row">${tBtns}</div>
    </div>
    <div class="total-banner">
      <div><div style="font-size:13px;color:#a78bfa;font-weight:700">📊 ${S.repFrom} ← ${S.repTo}</div><div style="font-size:11px;color:#8888aa;margin-top:3px">${filtered.length} فاتورة</div></div>
      <div style="display:flex;gap:18px;flex-wrap:wrap">
        <div style="text-align:center"><div style="font-size:11px;color:#8888aa;margin-bottom:3px">🏬 المحلات</div><div style="font-size:16px;font-weight:900;color:#a78bfa">${fmt(grandShop)}</div></div>
        <div style="text-align:center"><div style="font-size:11px;color:#8888aa;margin-bottom:3px">🚚 التوصيل</div><div style="font-size:16px;font-weight:900;color:#38bdf8">${fmt(grandDel)}</div></div>
        <div style="text-align:center"><div style="font-size:11px;color:#8888aa;margin-bottom:3px">💰 المجموع</div><div style="font-size:16px;font-weight:900;color:#e8e8f0">${fmt(grand)}</div></div>
      </div>
    </div>
    <div class="report-grid">${rcards||`<div style="grid-column:1/-1;text-align:center;padding:30px;color:#555577">لا توجد بيانات</div>`}</div>
    <div class="chart-box">
      <div style="font-weight:700;margin-bottom:8px;font-size:14px">📈 مقارنة المحلات</div>
      <div style="display:flex;gap:14px;margin-bottom:14px;font-size:11px">
        <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#a78bfa;margin-left:3px"></span>محل</span>
        <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:#38bdf8;margin-left:3px"></span>توصيل</span>
      </div>
      ${grand===0?`<div style="text-align:center;padding:30px;color:#555577">لا توجد مبيعات</div>`:bars}
    </div>
    <div class="detail-box">
      <div style="font-weight:700;margin-bottom:14px;font-size:14px">📋 تفاصيل الفواتير</div>
      ${filtered.length===0?`<div style="text-align:center;padding:30px;color:#555577">لا توجد فواتير</div>`:`<table><thead><tr><th>التاريخ</th><th>المحل</th><th>الموظف</th><th>النوع</th><th>المبلغ</th></tr></thead><tbody>${detailRows}</tbody></table>`}
    </div>`;
}

// ===== Global Bridge =====
window._login=tryLogin; window._logout=logout; window._tab=switchTab;
window._store=selectStore; window._type=setSaleType;
window._add=addSale; window._del=delSale;
window._edit=id=>{S.editId=id;S.modal=null;render();};
window._saveEdit=saveEdit;
window._openSaleEdit=id=>{S.editSaleId=id;S.modal=null;render();};
window._saveSaleEdit=saveSaleEdit;
window._closeModal=closeModal;
window._empMenu=toggleEmpMenu; window._emp=selectEmp;
window._applyDates=()=>{
const f=document.getElementById(“date-from”)?.value;
const t=document.getElementById(“date-to”)?.value;
if(f)S.repFrom=f;
if(t)S.repTo=t;
S.repPeriod=“custom”;
const main=document.querySelector(”.main”);
if(main&&S.tab===“report”)main.innerHTML=renderReport();
};
window._repStore=v=>{S.repStore=(v===“all”?“all”:Number(v)||v);render();};
window._repType=v=>{S.repType=v;render();};
window._setPeriod=setRepPeriod;
window._salary=addSalary; window._salaryAll=addSalaryAll;
window._convert=convertPoints; window._reset=resetWallet;
window._delTx=deleteTx;
window._openManagePoints=emp=>{S.modal={type:“managepoints”,emp};render();};
window._managePoints=async(emp,add)=>{
const pts=parseInt(document.getElementById(“pts-amount”)?.value);
if(!pts||pts<=0){alert(“أدخل عدد نقاط صحيح!”);return;}
await managePoints(emp,pts,add);
};
window._openAddMoney=emp=>{S.modal={type:“addmoney”,emp};render();};
window._doAddMoney=async()=>{const amt=parseFloat(document.getElementById(“am-amount”)?.value);const note=document.getElementById(“am-note”)?.value;if(!amt||amt<=0){alert(“أدخل مبلغ!”);return;}await addMoney(S.modal.emp,amt,note);};
window._openWithdraw=emp=>{S.modal={type:“withdraw”,emp};render();};
window._doWithdraw=async()=>{const amt=parseFloat(document.getElementById(“wd-amount”)?.value);const note=document.getElementById(“wd-note”)?.value;if(!amt||amt<=0){alert(“أدخل مبلغ!”);return;}await doWithdraw(S.modal.emp,amt,note);};
window._punchIn=punchIn; window._punchOut=punchOut;
window._sendBroadcast=sendBroadcast;
window._dismissNotif=dismissPendingNotif;
window._markAllRead=markAllRead;
</script>
