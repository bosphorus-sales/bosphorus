<style>

.tx-points{background:#F59E0B18;border:1px solid #F59E0B44;color:#F59E0B}

.tx-convert{background:#a78bfa18;border:1px solid #a78bfa44;color:#a78bfa}

.tx-reset{background:#EF444418;border:1px solid #EF444444;color:#EF4444}

.emp-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px}
.emp-item:hover{background:#a78bfa22}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:24px;padding:36px;width:100%;max-width:380px;text-align:center}
.login-inp{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #2a2a4a;background:#0d0d1a;color:#e8e8f0;font-family:inherit;font-size:16px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:12px}
.login-inp:focus{border-color:#a78bfa}
.login-btn{width:100%;padding:12px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;margin-bottom:10px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px}
.spinner{width:34px;height:34px;border:3px solid #2a2a4a;border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.notif-item{padding:14px;border-radius:12px;border:1px solid #2a2a4a;background:#0d0d1a;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.notif-unread{border-color:#a78bfa55;background:#a78bfa08}
.notif-dot{width:8px;height:8px;border-radius:50%;background:#a78bfa;margin-top:5px;flex-shrink:0}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
select option{background:#1a1a2e}
</style>

<body>
<div id="root"><div class="loading"><div class="spinner"></div><div style="color:#8888aa">&#1580;&#1575;&#1585;&#1610; &#1575;&#1604;&#1575;&#1578;&#1589;&#1575;&#1604;...</div></div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,addDoc,deleteDoc,updateDoc,setDoc,doc,serverTimestamp,query,orderBy,getDoc}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyAsllnjBZO4K9MyJNiTFoQJSfKtycQHMtU",authDomain:"bosphorus-76067.firebaseapp.com",projectId:"bosphorus-76067",storageBucket:"bosphorus-76067.firebasestorage.app",messagingSenderId:"678947739557",appId:"1:678947739557:web:f3d70cfc44d862ddf53a4c"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const salesCol=collection(db,"shop_sales");
const walletsCol=collection(db,"wallets");
const txCol=collection(db,"wallet_tx");
const attendCol=collection(db,"attendance");
const notifsCol=collection(db,"notifications");
const STORES=[{id:1,name:"\u0645\u062d\u0644 1",icon:"\uD83C\uDFEC",color:"#a78bfa"},{id:2,name:"\u0645\u062d\u0644 2",icon:"\uD83C\uDFEA",color:"#10B981"},{id:3,name:"\u0645\u062d\u0644 3",icon:"\uD83D\uDED2",color:"#F59E0B"}];
const EMPS=[["\u0639\u0645\u0627\u0631","\uD83D\uDC68\u200D\uD83D\uDCBC"],["\u062C\u0639\u0641\u0631","\uD83D\uDC68\u200D\uD83D\uDCBC"],["\u0645\u062B\u0646\u0649","\uD83D\uDC68\u200D\uD83D\uDCBC"],["\u0627\u062f\u0645\u0646","\uD83D\uDC69\u200D\uD83D\uDCBC"]];
const EMP_PASS={"\u0639\u0645\u0627\u0631":"111","\u062C\u0639\u0641\u0631":"222","\u0645\u062B\u0646\u0649":"333","\u0627\u062f\u0645\u0646":"1234"};
const EMP_STORE={"\u0639\u0645\u0627\u0631":1,"\u0627\u062f\u0645\u0646":2,"\u062C\u0639\u0641\u0631":3,"\u0645\u062B\u0646\u0649":2};
const SALARIES={"\u0639\u0645\u0627\u0631":200000,"\u062C\u0639\u0641\u0631":250000,"\u0645\u062B\u0646\u0649":250000,"\u0627\u062f\u0645\u0646":200000};
const EMP_ICONS={"\u0639\u0645\u0627\u0631":"\uD83D\uDC68\u200D\uD83D\uDCBC","\u062C\u0639\u0641\u0631":"\uD83D\uDC68\u200D\uD83D\uDCBC","\u0645\u062B\u0646\u0649":"\uD83D\uDC68\u200D\uD83D\uDCBC","\u0627\u062f\u0645\u0646":"\uD83D\uDC69\u200D\uD83D\uDCBC"};
const EMP_COLORS={"\u0639\u0645\u0627\u0631":"#a78bfa","\u062C\u0639\u0641\u0631":"#10B981","\u0645\u062B\u0646\u0649":"#38bdf8","\u0627\u062f\u0645\u0646":"#F59E0B"};
const PASS={owner:"0000"};
const PPW=5;const PV=1000;const WORK_START="12:00";const SHOP_LAT=33.31033;const SHOP_LNG=44.32380;const MAX_DISTANCE=100;
function today(){return new Date().toLocaleDateString("en-CA");}function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toLocaleDateString("en-CA");}
function fmt(n){return Number(n||0).toLocaleString("en-IQ")+" \u062F.\u0639";}
function fmtPts(n){return Number(n||0)+" \u0646\u0642\u0637\u0629";}
function calcDistance(a,b,c,d){const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;const q=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q));}
function timeToMins(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function getWeekStart(){const d=new Date(),day=d.getDay(),diff=d.getDate()-((day+6)%7);const mon=new Date(d);mon.setDate(diff);return mon.toLocaleDateString("en-CA");}
window.S={loggedIn:false,role:null,empName:null,tab:"pos",sel:1,saleType:"store",sales:[],wallets:{},txs:[],attendance:[],notifs:[],empSel:"",loaded:false,editId:null,editSaleId:null,repFrom:today(),repTo:today(),repStore:"all",repType:"all",repPeriod:"today",modal:null,gpsLoading:false,pendingNotif:null,camType:null,camReady:false,camNeedsPlay:false,repSalesPeriod:"today",repSalesFrom:today(),repSalesTo:today()};
let cdI=null,cdS=0,camStream=null;
function setSyncUI(s){const dot=document.getElementById("sync-dot"),txt=document.getElementById("sync-txt");if(!dot||!txt)return;if(s==="ok"){dot.className="dot dot-green";txt.textContent="\u0645\u062a\u0635\u0644";}else if(s==="saving"){dot.className="dot dot-yellow";txt.textContent="\u062c\u0627\u0631\u064a...";}else{dot.className="dot dot-red";txt.textContent="\u063a\u064a\u0631 \u0645\u062a\u0635\u0644";}}
onSnapshot(query(salesCol,orderBy("createdAt","desc")),function(snap){S.sales=snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});});S.loaded=true;setSyncUI("ok");const td=today();const sw=new Set(S.sales.filter(function(x){return x.date===td&&x.type==="store";}).map(function(x){return x.store;}));const ar=STORES.every(function(s){return sw.has(s.id);});if(ar&&!cdI&&cdS===0){getDoc(doc(db,"winners","winner_"+td)).then(function(ws){if(!ws.exists())startCD();});}render();},function(){setSyncUI("error");});
onSnapshot(walletsCol,function(snap){S.wallets={};snap.docs.forEach(function(d){S.wallets[d.id]=Object.assign({},d.data(),{id:d.id});});render();});
onSnapshot(query(txCol,orderBy("createdAt","desc")),function(snap){S.txs=snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});});render();});
onSnapshot(query(attendCol,orderBy("createdAt","desc")),function(snap){S.attendance=snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});});render();});
onSnapshot(query(notifsCol,orderBy("createdAt","desc")),function(snap){S.notifs=snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});});if(S.loggedIn&&S.empName&&!S.pendingNotif){const u=S.notifs.find(function(n){return n.type==="broadcast"&&!(n.readBy||{})[S.empName];});if(u)S.pendingNotif=u;}render();});
async function initWallets(){for(const[name]of EMPS){const ref=doc(db,"wallets",name);const snap=await getDoc(ref);if(!snap.exists())await setDoc(ref,{name,balance:0,points:0,createdAt:serverTimestamp()});}}
initWallets();
function tryLogin(){const pass=document.getElementById("pass-inp").value.trim();const err=document.getElementById("login-err");if(pass===PASS.owner){S.loggedIn=true;S.role="owner";S.empName=null;render();return;}for(const[name,p]of Object.entries(EMP_PASS)){if(pass===p){S.loggedIn=true;S.role="employee";S.empName=name;S.empSel=name;S.tab="pos";const u=S.notifs.find(function(n){return n.type==="broadcast"&&!(n.readBy||{})[name];});if(u)S.pendingNotif=u;render();return;}}err.textContent="\u274c \u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631 \u063a\u0644\u0637";document.getElementById("pass-inp").value="";}
function logout(){S.loggedIn=false;S.role=null;S.empName=null;S.empSel="";S.tab="pos";S.pendingNotif=null;render();}
async function addSale(){const el=document.getElementById("inp-amount");const amt=el?parseFloat(el.value):0;if(!amt||amt<=0){alert("\u0623\u062f\u062e\u0644 \u0645\u0628\u0644\u063a \u0635\u062d\u064a\u062d!");return;}if(!S.empSel){alert("\u0627\u062e\u062a\u0631 \u0627\u0633\u0645 \u0627\u0644\u0645\u0648\u0638\u0641!");return;}const now=new Date();setSyncUI("saving");await addDoc(salesCol,{store:S.sel,amount:amt,emp:S.empSel,type:S.saleType,date:today(),time:now.toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"}),createdAt:serverTimestamp()});if(el)el.value="";await checkPts();}
async function delSale(id){if(S.role!=="owner")return;if(!confirm("\u062d\u0630\u0641 \u0627\u0644\u0645\u0628\u064a\u0639\u0629\u061f"))return;await deleteDoc(doc(db,"shop_sales",id));}
async function saveEdit(){const a=document.getElementById("edit-amount"),e=document.getElementById("edit-emp"),t=document.getElementById("edit-type"),s=document.getElementById("edit-store");const amt=a?parseFloat(a.value):0;if(!amt||amt<=0){alert("\u0623\u062f\u062e\u0644 \u0645\u0628\u0644\u063a \u0635\u062d\u064a\u062d!");return;}await updateDoc(doc(db,"shop_sales",S.editId),{amount:amt,emp:e?e.value:"",type:t?t.value:"store",store:s?parseInt(s.value):1});S.editId=null;S.modal=null;render();}
async function saveSaleEdit(){const nd=document.getElementById("se-date"),na=document.getElementById("se-amount");const newDate=nd?nd.value:"",newAmt=na?parseFloat(na.value):0;if(!newDate){alert("\u0627\u062e\u062a\u0631 \u062a\u0627\u0631\u064a\u062e!");return;}if(!newAmt||newAmt<=0){alert("\u0623\u062f\u062e\u0644 \u0645\u0628\u0644\u063a \u0635\u062d\u064a\u062d!");return;}if(!confirm("\u062a\u0639\u062f\u064a\u0644 \u0627\u0644\u0645\u0628\u064a\u0639\u0629\u061f"))return;setSyncUI("saving");await updateDoc(doc(db,"shop_sales",S.editSaleId),{date:newDate,amount:newAmt});S.editSaleId=null;S.modal=null;render();alert("\u2705 \u062a\u0645 \u062a\u0639\u062f\u064a\u0644 \u0627\u0644\u0645\u0628\u064a\u0639\u0629");}
async function checkPts(){const td=today();const wr=doc(db,"winners","winner_"+td);const ws=await getDoc(wr);if(ws.exists())return;const et={};S.sales.filter(function(x){return x.date===td&&x.type==="store";}).forEach(function(x){et[x.emp]=(et[x.emp]||0)+x.amount;});const ranked=Object.entries(et).sort(function(a,b){return b[1]-a[1];});if(!ranked.length)return;const winner=ranked[0][0];const sw=new Set(S.sales.filter(function(x){return x.date===td&&x.type==="store";}).map(function(x){return x.store;}));const ar=STORES.every(function(s){return sw.has(s.id);});if(!ar)return;const wkS=getWeekStart();const wkP=S.txs.filter(function(x){return x.emp===winner&&x.type==="points"&&x.amount>0&&x.date>=wkS;}).reduce(function(a,b){return a+(b.amount||0);},0);if(wkP>=25){await setDoc(wr,{emp:winner,date:td,pointsAwarded:false,updatedAt:serverTimestamp()});return;}const wRef=doc(db,"wallets",winner);const wSnap=await getDoc(wRef);if(wSnap.exists()){await updateDoc(wRef,{points:(wSnap.data().points||0)+PPW});await addDoc(txCol,{emp:winner,type:"points",amount:PPW,note:"\uD83C\uDFC6 \u0641\u0627\u0626\u0632 "+td+" +"+PPW+" \u0646\u0642\u0627\u0637",date:td,createdAt:serverTimestamp()});await setDoc(wr,{emp:winner,date:td,pointsAwarded:true,updatedAt:serverTimestamp()});await addDoc(notifsCol,{type:"points",to:winner,msg:"\uD83C\uDFC6 \u0645\u0628\u0631\u0648\u0643! \u0641\u0632\u062a \u0628\u0627\u0644\u064a\u0648\u0645 \u0648\u062d\u0635\u0644\u062a \u0639\u0644\u0649 "+PPW+" \u0646\u0642\u0627\u0637",date:td,readBy:{},createdAt:serverTimestamp()});}}
function startCD(){cdS=5*60;if(cdI)clearInterval(cdI);cdI=setInterval(function(){cdS--;if(cdS<=0){clearInterval(cdI);cdI=null;cdS=0;checkPts();}const el=document.getElementById("countdown-el");if(el){if(cdS>0){const m=Math.floor(cdS/60),s=cdS%60;el.textContent="\u23f3 \u0627\u0644\u0646\u0642\u0627\u0637 \u062a\u064f\u0636\u0627\u0641 \u0628\u0639\u062f "+m+":"+String(s).padStart(2,"0");}else{el.textContent="\uD83C\uDFC6 \u062c\u0627\u0631\u064a \u0627\u062d\u062a\u0633\u0627\u0628...";}}},1000);}
async function managePoints(empName,pts,add){const w=S.wallets[empName]||{points:0};const cur=w.points||0;const newPts=add?cur+pts:Math.max(0,cur-pts);await updateDoc(doc(db,"wallets",empName),{points:newPts});await addDoc(txCol,{emp:empName,type:"points",amount:add?pts:-pts,note:(add?"\u2795":"\u2796")+" \u0646\u0642\u0627\u0637 \u0645\u0646 \u0627\u0644\u0645\u0627\u0644\u0643",date:today(),createdAt:serverTimestamp()});S.modal=null;render();alert("\u2705 "+(add?"\u0623\u0636\u064a\u0641\u062a":"\u062d\u064f\u0630\u0641\u062a")+" "+pts+" \u0646\u0642\u0637\u0629 "+(add?"\u0644\u0640":"\u0645\u0646")+" "+empName);}
async function addSalary(empName){const amt=SALARIES[empName]||0;const ref=doc(db,"wallets",empName);const snap=await getDoc(ref);await updateDoc(ref,{balance:((snap.data()&&snap.data().balance)||0)+amt});await addDoc(txCol,{emp:empName,type:"salary",amount:amt,note:"\u0631\u0627\u062a\u0628 \u0623\u0633\u0628\u0648\u0639\u064a \uD83D\uDCB0",date:today(),createdAt:serverTimestamp()});await addDoc(notifsCol,{type:"salary",to:empName,msg:"\uD83D\uDCB0 \u062a\u0645 \u0625\u0636\u0627\u0641\u0629 \u0631\u0627\u062a\u0628\u0643 "+fmt(amt),date:today(),readBy:{},createdAt:serverTimestamp()});alert("\u2705 "+fmt(amt)+" \u0644\u0640 "+empName);}
async function addSalaryAll(){if(!confirm("\u0625\u0636\u0627\u0641\u0629 \u0631\u0648\u0627\u062a\u0628 \u0644\u0644\u062c\u0645\u064a\u0639\u061f"))return;for(const[name]of EMPS)await addSalary(name);}
async function convertPoints(empName){const w=S.wallets[empName];if(!w||!w.points){alert("\u0644\u0627 \u062a\u0648\u062c\u062f \u0646\u0642\u0627\u0637!");return;}const pts=w.points,amt=pts*PV;if(!confirm("\u062a\u062d\u0648\u064a\u0644 "+pts+" \u0646\u0642\u0637\u0629 = "+fmt(amt)+"?"))return;await updateDoc(doc(db,"wallets",empName),{points:0,balance:(w.balance||0)+amt});await addDoc(txCol,{emp:empName,type:"convert",amount:amt,note:"\u062a\u062d\u0648\u064a\u0644 "+pts+" \u0646\u0642\u0637\u0629",date:today(),createdAt:serverTimestamp()});await addDoc(notifsCol,{type:"convert",to:empName,msg:"\uD83C\uDFAF \u062a\u0645 \u062a\u062d\u0648\u064a\u0644 "+pts+" \u0646\u0642\u0637\u0629 \u0625\u0644\u0649 "+fmt(amt),date:today(),readBy:{},createdAt:serverTimestamp()});}
async function addMoney(empName,amt,note){const ref=doc(db,"wallets",empName);const snap=await getDoc(ref);await updateDoc(ref,{balance:((snap.data()&&snap.data().balance)||0)+amt});await addDoc(txCol,{emp:empName,type:"add",amount:amt,note:note||"\u0625\u0636\u0627\u0641\u0629 \u0623\u0645\u0648\u0627\u0644",date:today(),createdAt:serverTimestamp()});await addDoc(notifsCol,{type:"add",to:empName,msg:"\uD83D\uDCB5 \u062a\u0645 \u0625\u0636\u0627\u0641\u0629 "+fmt(amt),date:today(),readBy:{},createdAt:serverTimestamp()});S.modal=null;render();alert("\u2705 "+fmt(amt)+" \u0644\u0640 "+empName);}
async function doWithdraw(empName,amt,note){const w=S.wallets[empName];if(!w||(w.balance||0)<amt){alert("\u0627\u0644\u0631\u0635\u064a\u062f \u063a\u064a\u0631 \u0643\u0627\u0641\u064a!");return;}await updateDoc(doc(db,"wallets",empName),{balance:(w.balance||0)-amt});await addDoc(txCol,{emp:empName,type:"withdraw",amount:amt,note:note||"\u0633\u062d\u0628",date:today(),createdAt:serverTimestamp()});await addDoc(notifsCol,{type:"withdraw",to:empName,msg:"\uD83D\uDCB8 \u062a\u0645 \u0633\u062d\u0628 "+fmt(amt),date:today(),readBy:{},createdAt:serverTimestamp()});S.modal=null;render();}
async function resetWallet(empName){if(!confirm("\u062a\u0635\u0641\u064a\u0631 "+empName+"?"))return;await updateDoc(doc(db,"wallets",empName),{balance:0,points:0});await addDoc(txCol,{emp:empName,type:"reset",amount:0,note:"\u062a\u0635\u0641\u064a\u0631",date:today(),createdAt:serverTimestamp()});}
async function deleteTx(id){if(!confirm("\u062d\u0630\u0641 \u0647\u0630\u0647 \u0627\u0644\u0645\u0639\u0627\u0645\u0644\u0629?"))return;const tx=S.txs.find(function(x){return x.id===id;});if(!tx)return;const wRef=doc(db,"wallets",tx.emp);const wSnap=await getDoc(wRef);if(!wSnap.exists())return;const w=wSnap.data();if(tx.type==="salary"||tx.type==="add"){await updateDoc(wRef,{balance:Math.max(0,(w.balance||0)-tx.amount)});}else if(tx.type==="withdraw"){await updateDoc(wRef,{balance:(w.balance||0)+tx.amount});}else if(tx.type==="points"){if(tx.amount>0){await updateDoc(wRef,{points:Math.max(0,(w.points||0)-tx.amount)});}else{await updateDoc(wRef,{points:(w.points||0)+Math.abs(tx.amount)});}}else if(tx.type==="convert"){const pb=Math.round(tx.amount/PV);await updateDoc(wRef,{balance:Math.max(0,(w.balance||0)-tx.amount),points:(w.points||0)+pb});}await deleteDoc(doc(db,"wallet_tx",id));}
async function sendBroadcast(){const el=document.getElementById("broadcast-msg");const msg=el?el.value.trim():"";if(!msg){alert("\u0627\u0643\u062a\u0628 \u0631\u0633\u0627\u0644\u0629!");return;}await addDoc(notifsCol,{type:"broadcast",to:"all",msg:msg,date:today(),readBy:{},createdAt:serverTimestamp()});S.modal=null;render();alert("\u2705 \u062a\u0645 \u0627\u0644\u0625\u0631\u0633\u0627\u0644");}
async function markNotifRead(id,empName){const ref=doc(db,"notifications",id);const snap=await getDoc(ref);if(snap.exists()){const rb=snap.data().readBy||{};rb[empName]=true;await updateDoc(ref,{readBy:rb});}}
async function dismissPendingNotif(){if(S.pendingNotif){if(S.empName)await markNotifRead(S.pendingNotif.id,S.empName);S.pendingNotif=null;render();}}
async function markAllRead(){const myN=S.notifs.filter(function(n){return(n.to===S.empName||n.to==="all")&&!(n.readBy||{})[S.empName];});for(const n of myN)await markNotifRead(n.id,S.empName);}

if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}
try{

async function captureAndSave(){const vid=document.getElementById("cam-vid");if(!vid)return;const canvas=document.createElement("canvas");canvas.width=280;canvas.height=210;const ctx=canvas.getContext("2d");ctx.save();ctx.scale(-1,1);ctx.drawImage(vid,-280,0,280,210);ctx.restore();const photo=canvas.toDataURL("image/jpeg",0.45);const empName=S.empName;const td=today();const now=new Date();const ts=now.toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"});const nm=now.getHours()*60+now.getMinutes();const type=S.camType||"in";stopCamera();if(type==="in"){const existing=S.attendance.find(function(x){return x.emp===empName&&x.date===td&&x.punchIn&&!x.punchOut;});if(existing){alert("أنت مسجل حضور بالفعل!");return;}const lb=Math.max(0,nm-timeToMins(WORK_START));await addDoc(attendCol,{emp:empName,date:td,punchIn:ts,punchOut:null,punchInMins:nm,punchOutMins:null,lateBy:lb,hours:null,photoIn:photo,createdAt:serverTimestamp()});alert("✅ تسجيل الحضور - "+ts+(lb>0?" - ⚠️ متأخر "+lb+" دقيقة":" - ✅ في الوقت"));}else{const existing=S.attendance.find(function(x){return x.emp===empName&&x.date===td&&x.punchIn&&!x.punchOut;});if(!existing){alert("ما عندك بصمة حضور!");return;}const hrs=Math.round((nm-existing.punchInMins)/60*10)/10;await updateDoc(doc(db,"attendance",existing.id),{punchOut:ts,punchOutMins:nm,hours:hrs,photoOut:photo});alert("✅ تسجيل الخروج - "+ts+" - ساعات: "+hrs);}render();}
async function punchIn(){await startCamera("in");}

function switchTab(t){if(t==="report"&&S.role!=="owner"){alert("\u0644\u0644\u0645\u0627\u0644\u0643 \u0641\u0642\u0637!");return;}S.tab=t;render();}

function toggleEmpMenu(){const m=document.getElementById("emp-menu");if(!m)return;const open=m.style.display==="block";m.style.display=open?"none":"block";if(!open)setTimeout(function(){document.addEventListener("click",function(e){const m2=document.getElementById("emp-menu");if(m2&&!m2.contains(e.target))m2.style.display="none";},{once:true});},0);}

function setRepPeriod(p){S.repPeriod=p;if(p==="today"){S.repFrom=today();S.repTo=today();}else if(p==="week"){S.repFrom=getWeekStart();S.repTo=today();}else if(p==="month"){const d=new Date();S.repFrom=new Date(d.getFullYear(),d.getMonth(),1).toLocaleDateString("en-CA");S.repTo=today();}else if(p==="all"){S.repFrom="2020-01-01";S.repTo=today();}render();}
function closeModal(){S.modal=null;S.editId=null;S.editSaleId=null;render();}
function render(){const root=document.getElementById("root");if(!root)return;if(!S.loggedIn){root.innerHTML=renderLogin();return;}if(S.pendingNotif){root.innerHTML=renderApp()+renderBroadcastAlert();return;}if(S.modal||S.editId||S.editSaleId){root.innerHTML=renderApp()+renderModal();return;}root.innerHTML=renderApp();}
function renderLogin(){return'<div class="login-wrap"><div class="login-box"><div style="font-size:48px;margin-bottom:14px">\uD83C\uDFEA</div><div style="font-size:21px;font-weight:900;margin-bottom:5px">\u0646\u0638\u0627\u0645 \u0645\u0628\u064a\u0639\u0627\u062a \u0627\u0644\u0628\u0633\u0641\u0648\u0631</div><div style="font-size:12px;color:#8888aa;margin-bottom:28px">\u0623\u062f\u062e\u0644 \u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631 \u0644\u0644\u062f\u062e\u0648\u0644</div><input class="login-inp" id="pass-inp" type="password" placeholder="\u2022\u2022\u2022\u2022" onkeydown="if(event.key===\'Enter\')window._login()"/><button class="login-btn" onclick="window._login()">\uD83D\uDD10 \u062f\u062e\u0648\u0644</button><div style="color:#EF4444;font-size:13px;min-height:18px;margin-top:4px" id="login-err"></div></div></div>';}
function renderBroadcastAlert(){const n=S.pendingNotif;return'<div class="overlay"><div class="modal" style="text-align:center;border-color:#a78bfa66"><div style="font-size:40px;margin-bottom:12px">\uD83D\uDCE2</div><div style="font-weight:900;font-size:17px;margin-bottom:8px">\u0631\u0633\u0627\u0644\u0629 \u0645\u0646 \u0627\u0644\u0645\u0627\u0644\u0643</div><div style="background:#0d0d1a;border-radius:12px;padding:16px;margin-bottom:20px;font-size:15px;line-height:1.7;border:1px solid #a78bfa33">'+n.msg+'</div><div style="font-size:11px;color:#8888aa;margin-bottom:20px">'+(n.date||"")+'</div><button class="btn btn-p" style="width:100%;padding:14px;font-size:15px" onclick="window._dismissNotif()">\u2705 \u062d\u0633\u0646\u0627\u064b</button></div></div>';}
function renderWinnerBanner(){const td=today(),et={};S.sales.filter(function(x){return x.date===td&&x.type==="store";}).forEach(function(x){et[x.emp]=(et[x.emp]||0)+x.amount;});let ranked=Object.entries(et).sort(function(a,b){return b[1]-a[1];});let label=td;if(!ranked.length){const allD=Array.from(new Set(S.sales.filter(function(x){return x.type==="store";}).map(function(x){return x.date;}))).sort(function(a,b){return b.localeCompare(a);});for(const d of allD){if(d===td)continue;const pv={};S.sales.filter(function(x){return x.date===d&&x.type==="store";}).forEach(function(x){pv[x.emp]=(pv[x.emp]||0)+x.amount;});if(Object.keys(pv).length){ranked=Object.entries(pv).sort(function(a,b){return b[1]-a[1];});label=d;break;}}}const sw=new Set(S.sales.filter(function(x){return x.date===td&&x.type==="store";}).map(function(x){return x.store;}));const ar=STORES.every(function(s){return sw.has(s.id);});const ss=STORES.map(function(s){return sw.has(s.id)?'<span style="color:#10B981">'+s.icon+'\u2713</span>':'<span style="color:#EF4444">'+s.icon+'\u23f3</span>';}).join(" ");const isT=label===td;const cdH=cdS>0&&ar&&isT?'<span id="countdown-el" style="background:#ffffff22;padding:3px 10px;border-radius:20px;font-size:12px">\u23f3 \u0627\u0644\u0646\u0642\u0627\u0637 \u062a\u064f\u0636\u0627\u0641 \u0628\u0639\u062f '+Math.floor(cdS/60)+':'+String(cdS%60).padStart(2,"0")+'</span>':ar&&isT?'<span id="countdown-el" style="background:#10B98133;padding:3px 10px;border-radius:20px;font-size:12px;color:#10B981">\u2705 \u0643\u0644 \u0627\u0644\u0645\u062d\u0644\u0627\u062a \u0633\u062c\u0644\u062a</span>':isT?'<span id="countdown-el" style="background:#ffffff22;padding:3px 10px;border-radius:20px;font-size:12px">'+ss+' \u064a\u0646\u062a\u0638\u0631 \u0627\u0643\u062a\u0645\u0627\u0644</span>':'<span id="countdown-el"></span>';const meds=["\uD83E\uDD47","\uD83E\uDD48","\uD83E\uDD49"];if(!ranked.length)return'<div class="winner-banner"><div class="winner-fixed-item">\uD83C\uDFEA <b>\u064
