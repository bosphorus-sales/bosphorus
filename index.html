<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>\u0646\u0638\u0627\u0645 \u0645\u0628\u064a\u0639\u0627\u062a \u0627\u0644\u0628\u0633\u0641\u0648\u0631</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;background:#0a0a14;color:#e8e8f0;min-height:100vh;padding-bottom:80px}

/* ===== HEADER ===== */
.header{background:linear-gradient(135deg,#13132a,#1a1a3a);border-bottom:1px solid #2a2a4a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;backdrop-filter:blur(10px)}
.logo{font-size:17px;font-weight:900;color:#fff}.logo span{color:#a78bfa}
.date-badge{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:10px;padding:4px 10px;font-size:11px;color:#8888aa}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #2a2a4a;background:#13132a}
.dot{width:7px;height:7px;border-radius:50%}
.dot-green{background:#10B981;animation:pulse 2s infinite}.dot-yellow{background:#F59E0B}.dot-red{background:#EF4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== WINNER BANNER ===== */
.winner-banner{background:linear-gradient(90deg,#7c3aed,#a78bfa,#e040fb,#a78bfa,#7c3aed);background-size:300% 100%;animation:gradMove 4s linear infinite;padding:12px 16px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;text-align:center}
@keyframes gradMove{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.winner-fixed-item{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:#fff;white-space:nowrap}
.winner-crown{font-size:20px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ===== HAMBURGER MENU ===== */
.hamburger-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:#a78bfa;font-size:22px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.hamburger-btn:active{background:#a78bfa22}
.side-menu{position:fixed;top:0;right:0;width:75%;max-width:280px;height:100vh;background:#13132a;border-left:1px solid #2a2a4a;z-index:100;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:-8px 0 32px #000a}
.side-menu.open{transform:translateX(0)}
.side-overlay{position:fixed;inset:0;background:#000a;z-index:99;opacity:0;pointer-events:none;transition:opacity .3s}
.side-overlay.open{opacity:1;pointer-events:all}
.side-header{padding:20px 16px;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;justify-content:space-between}
.side-title{font-size:16px;font-weight:900;color:#a78bfa}
.side-close{background:none;border:none;color:#8888aa;font-size:20px;cursor:pointer;padding:4px}
.side-item{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;border-bottom:1px solid #2a2a4a11;font-size:15px;font-weight:600;color:#e8e8f0;transition:background .15s;-webkit-tap-highlight-color:transparent}
.side-item:active,.side-item.active{background:#a78bfa18;color:#a78bfa}
.side-item-icon{font-size:20px;width:28px;text-align:center}
.notif-badge-side{background:#EF4444;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-right:auto}

/* ===== BOTTOM NAV ===== */
.bottom-nav{position:fixed;bottom:0;right:0;left:0;background:#13132a;border-top:1px solid #2a2a4a;display:flex;z-index:40;padding-bottom:calc(env(safe-area-inset-bottom) + 4px)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 4px 10px;cursor:pointer;color:#555577;font-size:10px;font-weight:700;transition:color .15s;gap:4px;position:relative;border:none;background:none;font-family:inherit;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.bnav-item.active{color:#a78bfa}
.bnav-item .bnav-icon{font-size:22px;line-height:1}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:#EF4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* ===== HIDE OLD TABS ===== */
.tabs{display:none}

/* ===== MAIN CONTENT ===== */
.main{max-width:1100px;margin:0 auto;padding:18px 14px}

/* ===== CARDS ===== */
.stores-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
@media(max-width:650px){.stores-grid,.report-grid,.wallet-grid{grid-template-columns:1fr!important}.pos-row{grid-template-columns:1fr!important}.type-tabs,.filter-row{flex-direction:column}}
.store-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:16px;padding:15px;cursor:pointer;transition:all .2s;position:relative}
.store-card:active{transform:scale(.97)}.store-card.selected{border-color:#a78bfa;box-shadow:0 0 20px #a78bfa22}
.sel-dot{position:absolute;top:10px;left:10px;width:8px;height:8px;border-radius:50%;background:#a78bfa;display:none}
.store-card.selected .sel-dot{display:block}
.s-icon{font-size:24px;margin-bottom:5px}.s-name{font-weight:900;font-size:13px}.s-sub{font-size:10px;color:#8888aa;margin-top:2px}
.s-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:7px}
.s-mini{background:#0d0d1a;border-radius:7px;padding:4px 7px}
.s-mini-lbl{font-size:9px;color:#8888aa}.s-mini-val{font-size:11px;font-weight:700;margin-top:1px}
.s-total{margin-top:6px;font-size:13px;font-weight:900;border-top:1px solid #2a2a4a;padding-top:6px}

/* ===== POS BOX ===== */
.pos-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:16px;padding:18px}
.pos-title{font-weight:900;font-size:15px;margin-bottom:14px}

/* ===== TYPE TABS ===== */
.type-tabs{display:flex;gap:8px;margin-bottom:16px}
.type-tab{flex:1;padding:14px;border-radius:12px;border:2px solid #2a2a4a;background:#0d0d1a;color:#8888aa;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.type-tab.active-store{border-color:#a78bfa;background:#a78bfa18;color:#a78bfa}
.type-tab.active-delivery{border-color:#38bdf8;background:#38bdf818;color:#38bdf8}

/* ===== POS ROW ===== */
.pos-row{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-bottom:12px;align-items:end}
.lbl{font-size:12px;color:#8888aa;margin-bottom:5px}
.inp{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #2a2a4a;background:#0d0d1a;color:#e8e8f0;font-family:inherit;font-size:14px;outline:none;-webkit-appearance:none}
.inp:focus{border-color:#a78bfa}

/* ===== BUTTONS ===== */
.btn{padding:13px 18px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn:active{transform:scale(.96)}
.btn-p{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff}
.btn-g{background:#1a1a2e;border:1px solid #2a2a4a;color:#8888aa}
.btn-red{background:linear-gradient(135deg,#EF4444,#dc2626);color:#fff}
.btn-green{background:linear-gradient(135deg,#10B981,#059669);color:#fff}
.btn-yellow{background:linear-gradient(135deg,#F59E0B,#d97706);color:#fff}
.btn-edit{background:#F59E0B15;border:1px solid #F59E0B44;color:#F59E0B;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px}
.btn-del{background:#EF444415;border:1px solid #EF444433;color:#EF4444;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px}

/* ===== SALE SUMMARY ===== */
.sale-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.sum-box{background:#0d0d1a;border-radius:12px;padding:12px 14px;border:1px solid #2a2a4a}
.sum-lbl{font-size:11px;color:#8888aa;margin-bottom:3px}.sum-val{font-size:16px;font-weight:900}

/* ===== TABLE ===== */
table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}
th{padding:10px 11px;text-align:right;color:#8888aa;border-bottom:1px solid #2a2a4a}
td{padding:10px 11px;border-bottom:1px solid #2a2a4a22;vertical-align:middle}
tr:hover td{background:#ffffff05}
.type-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-store{background:#a78bfa18;border:1px solid #a78bfa44;color:#a78bfa}
.badge-delivery{background:#38bdf818;border:1px solid #38bdf844;color:#38bdf8}

/* ===== OVERLAY / MODAL ===== */
.overlay{position:fixed;inset:0;background:#000b;display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0}
.modal{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:28px 24px 36px;max-height:92vh;overflow-y:auto}
.modal-title{font-weight:900;font-size:17px;margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}

/* ===== FILTER BOX ===== */
.filter-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:16px;padding:18px;margin-bottom:20px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn,.date-btn{padding:10px 16px;border-radius:10px;border:2px solid #2a2a4a;background:#0d0d1a;color:#8888aa;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.filter-btn.active,.date-btn.active{border-color:#a78bfa;background:#a78bfa;color:#fff}

/* ===== REPORT ===== */
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.rcard{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:16px;text-align:center;border:1px solid #2a2a4a}
.rcard-split{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:7px}
.rcard-mini{background:#0d0d1a;border-radius:7px;padding:6px}
.total-banner{background:linear-gradient(135deg,#7c3aed22,#a78bfa22);border:1px solid #a78bfa44;border-radius:14px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.chart-box,.detail-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:14px;padding:18px;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{width:60px;font-size:12px;font-weight:700;text-align:right}
.bar-track{flex:1;height:28px;background:#0d0d1a;border-radius:7px;overflow:hidden;position:relative}
.bar-val{width:100px;font-size:11px;font-weight:700;text-align:left}

/* ===== WALLET ===== */
.wallet-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:22px}
.wallet-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:18px;padding:18px}
.wc-name{font-size:15px;font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.wc-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #2a2a4a22}
.wc-lbl{font-size:12px;color:#8888aa}.wc-val{font-size:17px;font-weight:900}
.wc-actions{display:flex;gap:5px;margin-top:12px;flex-wrap:wrap}
.wc-btn{flex:1;padding:9px 5px;border-radius:10px;border:none;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;min-width:56px;text-align:center}
.tx-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.tx-salary{background:#10B98118;border:1px solid #10B98144;color:#10B981}
.tx-points{background:#F59E0B18;border:1px solid #F59E0B44;color:#F59E0B}
.tx-withdraw{background:#EF444418;border:1px solid #EF444444;color:#EF4444}
.tx-convert{background:#a78bfa18;border:1px solid #a78bfa44;color:#a78bfa}
.tx-add{background:#10B98118;border:1px solid #10B98144;color:#10B981}
.tx-reset{background:#EF444418;border:1px solid #EF444444;color:#EF4444}

/* ===== EMP MENU ===== */
.emp-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;width:100%;background:#1a1a2e;border:1px solid #a78bfa55;border-radius:14px;overflow:hidden;z-index:50;box-shadow:0 8px 24px #0008}
.emp-item{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px}
.emp-item:active{background:#a78bfa22}

/* ===== LOGIN ===== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at top,#1a1a3a 0%,#0a0a14 70%)}
.login-box{background:linear-gradient(135deg,#13132a,#1a1a2e);border:1px solid #2a2a4a;border-radius:28px;padding:40px 28px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px #000a}
.login-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:6px}
.login-sub{font-size:13px;color:#8888aa;margin-bottom:32px}

/* ===== NUM PAD ===== */
.numpad-wrap{background:#0d0d1a;border-radius:16px;padding:16px;margin-bottom:14px}
.numpad-display{background:#13132a;border-radius:12px;padding:16px;text-align:center;font-size:28px;font-weight:900;color:#a78bfa;min-height:60px;margin-bottom:12px;letter-spacing:4px;border:1px solid #2a2a4a}
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.numpad-btn{padding:18px 10px;border-radius:12px;border:none;background:#1a1a2e;color:#e8e8f0;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .1s;border:1px solid #2a2a4a22}
.numpad-btn:active{background:#a78bfa33;transform:scale(.94)}
.numpad-btn.zero{grid-column:1/span 2}
.numpad-btn.del{background:#EF444418;color:#EF4444;border-color:#EF444433}
.numpad-btn.confirm{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;border:none}

/* ===== LOADING ===== */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px}
.spinner{width:36px;height:36px;border:3px solid #2a2a4a;border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== NOTIFS ===== */
.notif-item{padding:14px;border-radius:14px;border:1px solid #2a2a4a;background:#0d0d1a;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.notif-unread{border-color:#a78bfa55;background:#a78bfa08}
.notif-dot{width:8px;height:8px;border-radius:50%;background:#a78bfa;margin-top:5px;flex-shrink:0}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
select option{background:#1a1a2e}
</style>
</head>

async function checkPts(){
  const td=today();

  // ÙØ¸Ø§Ù Ø§ÙÙÙØ§Ø· Ø§ÙØ¬Ø¯ÙØ¯:
  // ÙØ­Ù 1 (Ø§ÙØ¬Ø§ÙØ¹Ø© ÙÙÙ, store id=1):
  //   - ÙØ¨ÙØ¹Ø§Øª Ø§ÙÙØ­Ù > 500,000 â 5 ÙÙØ§Ø· ÙØ¹ÙØ§Ø±
  //   - ÙØ¨ÙØ¹Ø§Øª Ø§ÙØªÙØµÙÙ > 1,000,000 â 5 ÙÙØ§Ø· ÙÙØ«ÙÙ
  // ÙØ­Ù 3 (Ø´Ø§Ø±Ø¹ Ø§ÙØ±Ø¨ÙØ¹, store id=3):
  //   - ÙØ¨ÙØ¹Ø§Øª Ø§ÙÙØ­Ù > 500,000 â 5 ÙÙØ§Ø· ÙØ¬Ø¹ÙØ±
  //   - ÙØ¨ÙØ¹Ø§Øª Ø§ÙØªÙØµÙÙ > 500,000 â 5 ÙÙØ§Ø· ÙØ¬Ø¹ÙØ±

  const todaySales = S.sales.filter(function(x){ return x.date===td; });

  // -- ÙØ­Ù 1 --
  const s1Shop = todaySales.filter(function(x){ return x.store===1&&x.type==="store"; }).reduce(function(a,b){return a+b.amount;},0);
  const s1Del  = todaySales.filter(function(x){ return x.store===1&&x.type==="delivery"; }).reduce(function(a,b){return a+b.amount;},0);

  // -- ÙØ­Ù 3 --
  const s3Shop = todaySales.filter(function(x){ return x.store===3&&x.type==="store"; }).reduce(function(a,b){return a+b.amount;},0);
  const s3Del  = todaySales.filter(function(x){ return x.store===3&&x.type==="delivery"; }).reduce(function(a,b){return a+b.amount;},0);

  // ÙÙØ§Ø¹Ø¯ Ø§ÙÙÙØ§Ø·
  const rules = [
    { key:"s1_shop",   emp:"\u0639\u0645\u0627\u0631",  threshold:500000,  amount:s1Shop, label:"\u0645\u062d\u0644 1 - \u0645\u062d\u0644" },
    { key:"s1_del",    emp:"\u0645\u062b\u0646\u0649",  threshold:1000000, amount:s1Del,  label:"\u0645\u062d\u0644 1 - \u062a\u0648\u0635\u064a\u0644" },
    { key:"s3_shop",   emp:"\u062c\u0639\u0641\u0631",  threshold:500000,  amount:s3Shop, label:"\u0645\u062d\u0644 3 - \u0645\u062d\u0644" },
    { key:"s3_del",    emp:"\u062c\u0639\u0641\u0631",  threshold:500000,  amount:s3Del,  label:"\u0645\u062d\u0644 3 - \u062a\u0648\u0635\u064a\u0644" }
  ];

  for(const rule of rules){
    if(rule.amount < rule.threshold) continue;

    // Check if already awarded today for this rule
    const awardDocId = "pts_"+td+"_"+rule.key;
    const awardRef = doc(db,"winners",awardDocId);
    const awardSnap = await getDoc(awardRef);
    if(awardSnap.exists()) continue; // already awarded

    // Check weekly cap (25 pts max per week)
    const wkS = getWeekStart();
    const wkPts = S.txs.filter(function(x){
      return x.emp===rule.emp&&x.type==="points"&&x.amount>0&&x.date>=wkS;
    }).reduce(function(a,b){return a+(b.amount||0);},0);

    if(wkPts>=25){
      // Mark as processed even if capped
      await setDoc(awardRef,{emp:rule.emp,date:td,rule:rule.key,pointsAwarded:false,capped:true,updatedAt:serverTimestamp()});
      continue;
    }

    // Award 5 points
    const wRef = doc(db,"wallets",rule.emp);
    const wSnap = await getDoc(wRef);
    if(!wSnap.exists()) continue;

    await updateDoc(wRef,{points:(wSnap.data().points||0)+PPW});
    await addDoc(txCol,{
      emp:rule.emp,
      type:"points",
      amount:PPW,
      note:"\uD83C\uDFC6 "+rule.label+" +"+PPW+" \u0646\u0642\u0627\u0637 ("+td+")",
      date:td,
      createdAt:serverTimestamp()
    });
    await setDoc(awardRef,{emp:rule.emp,date:td,rule:rule.key,threshold:rule.threshold,amount:rule.amount,pointsAwarded:true,updatedAt:serverTimestamp()});
    await addDoc(notifsCol,{
      type:"points",
      to:rule.emp,
      msg:"\uD83C\uDFC6 \u0645\u0628\u0631\u0648\u0643! "+rule.label+" \u062a\u062c\u0627\u0648\u0632\u062a \u0627\u0644\u0647\u062f\u0641. \u062d\u0635\u0644\u062a \u0639\u0644\u0649 "+PPW+" \u0646\u0642\u0627\u0637",
      date:td,
      readBy:{},
      createdAt:serverTimestamp()
    });
  }
}

var invCamStream=null;
async function startInvCamera(){
  if(invCamStream){invCamStream.getTracks().forEach(function(t){t.stop();});invCamStream=null;}
  try{
    invCamStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
    S._invCamReady=true;
    render();
    // attach stream after render paints the video element
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        var vid=document.getElementById("inv-cam-vid");
        if(vid&&invCamStream){
          vid.srcObject=invCamStream;
          vid.play().catch(function(e){console.log("play err",e);});
        }
      });
    });
  }catch(e){
    var msg=e.name==="NotAllowedError"?"\u062a\u0645 \u0631\u0641\u0636 \u0627\u0644\u0648\u0635\u0648\u0644 \u0644\u0644\u0643\u0627\u0645\u064a\u0631\u0627":"\u062e\u0637\u0623: "+e.message;
    alert(msg);S._invCamReady=false;render();
  }
}
function stopInvCamera(){
  if(invCamStream){invCamStream.getTracks().forEach(function(t){t.stop();});invCamStream=null;}
  S._invCamReady=false;render();
}
async function scanBarcode(){
  var vid=document.getElementById("inv-cam-vid");
  // Try BarcodeDetector (Chrome/Android)
  if(vid&&invCamStream&&typeof BarcodeDetector!=="undefined"){
    try{
      var bd=new BarcodeDetector({formats:["ean_13","ean_8","code_128","code_39","qr_code","upc_a","upc_e"]});
      var canvas=document.createElement("canvas");
      canvas.width=vid.videoWidth||640;canvas.height=vid.videoHeight||480;
      canvas.getContext("2d").drawImage(vid,0,0);
      var codes=await bd.detect(canvas);
      if(codes.length>0){
        var el=document.getElementById("inv-barcode");if(el){el.value=codes[0].rawValue;el.focus();}
        stopInvCamera();
        return;
      }else{
        alert("\u0644\u0645 \u064a\u062a\u0645 \u0627\u0644\u0643\u0634\u0641. \u0642\u0631\u0651\u0628 \u0627\u0644\u0643\u0627\u0645\u064a\u0631\u0627 \u0645\u0646 \u0627\u0644\u0628\u0627\u0631\u0643\u0648\u062f.");
        return;
      }
    }catch(e){console.log("BarcodeDetector error:",e);}
  }
  // Fallback: manual input
  stopInvCamera();
  setTimeout(function(){
    var code=prompt("\uD83D\uDCF7 \u0623\u062f\u062e\u0644 \u0627\u0644\u0628\u0627\u0631\u0643\u0648\u062f \u064a\u062f\u0648\u064a\u0627\u064b:");
    if(code&&code.trim()){
      var el=document.getElementById("inv-barcode");
      if(el){el.value=code.trim();el.focus();}
    }
  },300);
}

// ===== CASHIER TAB =====
// Load cashier sales history
function loadCashier() {
  if (S._cashierLoaded) return;
  S._cashierLoaded = true;
  onSnapshot(query(cashierCol, orderBy("createdAt", "desc")), function(snap) {
    S.cashierSales = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    render();
  });
}

// Search inventory for cashier
function cashierSearch(val) {
  S._cashierSearch = val;
  render();
}

// Add item to cart
function cashierAddToCart(itemId) {
  var item = (S.inventory || []).find(function(x) { return x.id === itemId; });
  if (!item) return;
  var cart = S._cashierCart || [];
  var existing = cart.find(function(x) { return x.itemId === itemId; });
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({
      itemId: itemId,
      name: item.name,
      size: item.size || "",
      barcode: item.barcode || "",
      loc: item.loc,
      qty: 1,
      price: 0,
      maxQty: item.count || 0
    });
  }
  S._cashierCart = cart;
  S._cashierSearch = "";
  render();
}

// Remove item from cart
function cashierRemoveFromCart(itemId) {
  S._cashierCart = (S._cashierCart || []).filter(function(x) { return x.itemId !== itemId; });
  render();
}

// Update cart item qty
function cashierSetQty(itemId, qty) {
  var cart = S._cashierCart || [];
  var item = cart.find(function(x) { return x.itemId === itemId; });
  if (item) {
    item.qty = Math.max(1, Math.min(parseInt(qty) || 1, item.maxQty));
  }
  S._cashierCart = cart;
  render();
}

// Update cart item price
function cashierSetPrice(itemId, price) {
  var cart = S._cashierCart || [];
  var item = cart.find(function(x) { return x.itemId === itemId; });
  if (item) item.price = parseFloat(price) || 0;
  S._cashierCart = cart;
}

// Complete sale
async function cashierCompleteSale() {
  var cart = S._cashierCart || [];
  if (cart.length === 0) { alert("\u0627\u0644\u0633\u0644\u0629 \u0641\u0627\u0631\u063a\u0629!"); return; }

  var hasZeroPrice = cart.some(function(x) { return !x.price || x.price <= 0; });
  if (hasZeroPrice) { alert("\u0623\u062f\u062e\u0644 \u0633\u0639\u0631 \u0644\u0643\u0644 \u0627\u0644\u0645\u0648\u0627\u062f!"); return; }

  var saleType = S._cashierType || "store";
  var storeId = S._cashierStore || 1;
  var custName = (document.getElementById("csh-cust-name") || { value: "" }).value.trim();
  var custPhone = (document.getElementById("csh-cust-phone") || { value: "" }).value.trim();



  var total = cart.reduce(function(a, b) { return a + b.qty * b.price; }, 0);
  var now = new Date();
  var timeStr = now.toLocaleTimeString("en", { hour: "2-digit", minute: "2-digit" });

  // 1. Save cashier sale record
  var saleRef = await addDoc(cashierCol, {
    items: cart.map(function(x) {
      return { itemId: x.itemId, name: x.name, qty: x.qty, price: x.price, total: x.qty * x.price, size: x.size || "", loc: x.loc };
    }),
    total: total,
    type: saleType,
    store: storeId,

    emp: S.empName || "owner",
    date: today(),
    time: timeStr,
    createdAt: serverTimestamp()
  });

  // 2. Deduct from inventory + log tx
  for (var i = 0; i < cart.length; i++) {
    var ci = cart[i];
    var invItem = (S.inventory || []).find(function(x) { return x.id === ci.itemId; });
    if (invItem) {
      var newCount = Math.max(0, (invItem.count || 0) - ci.qty);
      await updateDoc(doc(db, "inventory", ci.itemId), { count: newCount });
      await addDoc(invTxCol, {
        type: "sell",
        itemId: ci.itemId,
        itemName: ci.name,
        count: ci.qty,
        price: ci.price,
        total: ci.qty * ci.price,
        by: S.empName || "owner",
        date: today(),
        note: "\u0643\u0627\u0634\u064a\u0631 - " + (saleType === "delivery" ? "\u062a\u0648\u0635\u064a\u0644" : "\u0645\u062d\u0644"),
        createdAt: serverTimestamp()
      });
    }
  }

  // 3. Generate PDF invoice
  cashierPrintInvoice(cart, total, saleType, storeId, timeStr);

  // 5. Reset cart
  S._cashierCart = [];
  S._cashierType = "store";
  S._cashierSearch = "";
  S.modal = null;
  render();
  alert("\u2705 \u062a\u0645\u062a \u0639\u0645\u0644\u064a\u0629 \u0627\u0644\u0628\u064a\u0639!");
}
