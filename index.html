<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>نظام مبيعات البسفور</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;background:#0d0d1a;color:#e8e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid #2a2a4a;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-size:18px;font-weight:900;color:#fff}.logo span{color:#a78bfa}
.date-badge{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:10px;padding:5px 12px;font-size:12px;color:#8888aa}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #2a2a4a}
.dot{width:8px;height:8px;border-radius:50%}
.dot-green{background:#10B981;animation:pulse 2s infinite}.dot-yellow{background:#F59E0B}.dot-red{background:#EF4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.winner-banner{background:linear-gradient(90deg,#7c3aed,#a78bfa,#e040fb,#a78bfa,#7c3aed);background-size:300% 100%;animation:gradMove 4s linear infinite;padding:14px 20px;border-bottom:2px solid #a78bfa55;width:100%;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;text-align:center}
@keyframes gradMove{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.winner-fixed-item{display:inline-flex;align-items:center;gap:10px;font-size:15px;font-weight:800;color:#fff;white-space:nowrap}
.winner-crown{font-size:22px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.tabs{display:flex;background:#1a1a2e;border-bottom:1px solid #2a2a4a;padding:0 16px;overflow-x:auto}
.tab{padding:13px 16px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:#8888aa;transition:all .2s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;position:relative}
.tab.active{color:#a78bfa;border-bottom-color:#a78bfa}
.notif-badge{position:absolute;top:8px;right:8px;background:#EF4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.main{max-width:1100px;margin:0 auto;padding:22px 14px}
.stores-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
@media(max-width:650px){.stores-grid,.report-grid,.wallet-grid{grid-template-columns:1fr!important}.pos-row{grid-template-columns:1fr!important}.type-tabs,.filter-row{flex-direction:column}}
.store-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:16px;padding:16px;cursor:pointer;transition:all .2s;position:relative}
.store-card:hover{transform:translateY(-2px)}.store-card.selected{border-color:#a78bfa;box-shadow:0 0 20px #a78bfa33}
.sel-dot{position:absolute;top:10px;left:10px;width:9px;height:9px;border-radius:50%;background:#a78bfa;display:none}
.store-card.selected .sel-dot{display:block}
.s-icon{font-size:26px;margin-bottom:6px}.s-name{font-weight:900;font-size:14px}.s-sub{font-size:11px;color:#8888aa;margin-top:2px}
.s-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
.s-mini{background:#0d0d1a;border-radius:7px;padding:5px 8px}
.s-mini-lbl{font-size:10px;color:#8888aa}.s-mini-val{font-size:12px;font-weight:700;margin-top:2px}
.s-total{margin-top:7px;font-size:14px;font-weight:900;border-top:1px solid #2a2a4a;padding-top:7px}
.pos-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:16px;padding:20px}
.pos-title{font-weight:900;font-size:15px;margin-bottom:14px}
.type-tabs{display:flex;gap:8px;margin-bottom:18px}
.type-tab{flex:1;padding:11px;border-radius:11px;border:2px solid #2a2a4a;background:#0d0d1a;color:#8888aa;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s}
.type-tab.active-store{border-color:#a78bfa;background:#a78bfa18;color:#a78bfa}
.type-tab.active-delivery{border-color:#38bdf8;background:#38bdf818;color:#38bdf8}
.pos-row{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-bottom:12px;align-items:end}
.lbl{font-size:12px;color:#8888aa;margin-bottom:5px}
.inp{width:100%;padding:10px 13px;border-radius:10px;border:1px solid #2a2a4a;background:#0d0d1a;color:#e8e8f0;font-family:inherit;font-size:13px;outline:none}
.inp:focus{border-color:#a78bfa}
.btn{padding:10px 16px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff}
.btn-g{background:#1a1a2e;border:1px solid #2a2a4a;color:#8888aa}
.btn-red{background:linear-gradient(135deg,#EF4444,#dc2626);color:#fff}
.btn-green{background:linear-gradient(135deg,#10B981,#059669);color:#fff}
.btn-yellow{background:linear-gradient(135deg,#F59E0B,#d97706);color:#fff}
.btn-edit{background:#F59E0B15;border:1px solid #F59E0B44;color:#F59E0B;border-radius:7px;padding:4px 9px;cursor:pointer;font-size:11px}
.btn-del{background:#EF444415;border:1px solid #EF444433;color:#EF4444;border-radius:7px;padding:4px 9px;cursor:pointer;font-size:11px}
.sale-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.sum-box{background:#0d0d1a;border-radius:11px;padding:11px 13px;border:1px solid #2a2a4a}
.sum-lbl{font-size:11px;color:#8888aa;margin-bottom:3px}.sum-val{font-size:15px;font-weight:900}
table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}
th{padding:9px 11px;text-align:right;color:#8888aa;border-bottom:1px solid #2a2a4a}
td{padding:9px 11px;border-bottom:1px solid #2a2a4a22;vertical-align:middle}
tr:hover td{background:#ffffff05}
.type-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-store{background:#a78bfa18;border:1px solid #a78bfa44;color:#a78bfa}
.badge-delivery{background:#38bdf818;border:1px solid #38bdf844;color:#38bdf8}
.overlay{position:fixed;inset:0;background:#000a;display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:20px;width:100%;max-width:440px;padding:26px;max-height:90vh;overflow-y:auto}
.modal-title{font-weight:900;font-size:16px;margin-bottom:20px}
.form-row{margin-bottom:13px}
.form-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.filter-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:16px;padding:18px;margin-bottom:22px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn{padding:8px 14px;border-radius:9px;border:2px solid #2a2a4a;background:#0d0d1a;color:#8888aa;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.filter-btn.active{border-color:#a78bfa;background:#a78bfa;color:#fff}
.date-btn{padding:8px 14px;border-radius:9px;border:2px solid #2a2a4a;background:#0d0d1a;color:#8888aa;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.date-btn.active{border-color:#a78bfa;background:#a78bfa;color:#fff}
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.rcard{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:14px;padding:18px;text-align:center;border:1px solid #2a2a4a}
.rcard-split{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.rcard-mini{background:#0d0d1a;border-radius:7px;padding:7px}
.total-banner{background:linear-gradient(135deg,#7c3aed22,#a78bfa22);border:1px solid #a78bfa44;border-radius:14px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.chart-box,.detail-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:14px;padding:20px;margin-bottom:18px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.bar-lbl{width:65px;font-size:12px;font-weight:700;text-align:right}
.bar-track{flex:1;height:30px;background:#0d0d1a;border-radius:7px;overflow:hidden;position:relative}
.bar-val{width:110px;font-size:11px;font-weight:700;text-align:left}
.wallet-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.wallet-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:18px;padding:20px}
.wc-name{font-size:15px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.wc-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2a2a4a22}
.wc-lbl{font-size:12px;color:#8888aa}.wc-val{font-size:18px;font-weight:900}
.wc-actions{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.wc-btn{flex:1;padding:8px 6px;border-radius:9px;border:none;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;min-width:60px;text-align:center}
.tx-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.tx-salary{background:#10B98118;border:1px solid #10B98144;color:#10B981}
.tx-points{background:#F59E0B18;border:1px solid #F59E0B44;color:#F59E0B}
.tx-withdraw{background:#EF444418;border:1px solid #EF444444;color:#EF4444}
.tx-convert{background:#a78bfa18;border:1px solid #a78bfa44;color:#a78bfa}
.tx-add{background:#10B98118;border:1px solid #10B98144;color:#10B981}
.tx-reset{background:#EF444418;border:1px solid #EF444444;color:#EF4444}
.emp-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;width:100%;background:#1a1a2e;border:1px solid #a78bfa55;border-radius:12px;overflow:hidden;z-index:50;box-shadow:0 8px 24px #0008}
.emp-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px}
.emp-item:hover{background:#a78bfa22}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2a2a4a;border-radius:24px;padding:36px;width:100%;max-width:380px;text-align:center}
.login-inp{width:100%;padding:12px 16px;border-radius:12px;border:1px solid #2a2a4a;background:#0d0d1a;color:#e8e8f0;font-family:inherit;font-size:16px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:12px}
.login-inp:focus{border-color:#a78bfa}
.login-btn{width:100%;padding:12px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;margin-bottom:10px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:14px}
.spinner{width:34px;height:34px;border:3px solid #2a2a4a;border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.notif-item{padding:14px;border-radius:12px;border:1px solid #2a2a4a;background:#0d0d1a;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.notif-unread{border-color:#a78bfa55;background:#a78bfa08}
.notif-dot{width:8px;height:8px;border-radius:50%;background:#a78bfa;margin-top:5px;flex-shrink:0}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
select option{background:#1a1a2e}
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spinner"></div><div style="color:#8888aa">&#1580;&#1575;&#1585;&#1610; &#1575;&#1604;&#1575;&#1578;&#1589;&#1575;&#1604;...</div></div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import{getFirestore,collection,onSnapshot,addDoc,deleteDoc,updateDoc,setDoc,doc,serverTimestamp,query,orderBy,getDoc}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
const FC={apiKey:"AIzaSyAsllnjBZO4K9MyJNiTFoQJSfKtycQHMtU",authDomain:"bosphorus-76067.firebaseapp.com",projectId:"bosphorus-76067",storageBucket:"bosphorus-76067.firebasestorage.app",messagingSenderId:"678947739557",appId:"1:678947739557:web:f3d70cfc44d862ddf53a4c"};
const app=initializeApp(FC);
const db=getFirestore(app);
const salesCol=collection(db,"shop_sales");
const walletsCol=collection(db,"wallets");
const txCol=collection(db,"wallet_tx");
const attendCol=collection(db,"attendance");
const notifsCol=collection(db,"notifications");

const STORES=[{id:1,name:"\u0645\u062d\u0644 1",icon:"\uD83C\uDFEC",color:"#a78bfa"},{id:2,name:"\u0645\u062d\u0644 2",icon:"\uD83C\uDFEA",color:"#10B981"},{id:3,name:"\u0645\u062d\u0644 3",icon:"\uD83D\uDED2",color:"#F59E0B"}];
const EMPS=[["\u0639\u0645\u0627\u0631","\uD83D\uDC68\u200D\uD83D\uDCBC"],["\u062C\u0639\u0641\u0631","\uD83D\uDC68\u200D\uD83D\uDCBC"],["\u0645\u062B\u0646\u0649","\uD83D\uDC68\u200D\uD83D\uDCBC"],["\u0646\u0648\u0631\u0647","\uD83D\uDC69\u200D\uD83D\uDCBC"]];
const EMP_PASS={"\u0639\u0645\u0627\u0631":"111","\u062C\u0639\u0641\u0631":"222","\u0645\u062B\u0646\u0649":"333","\u0646\u0648\u0631\u0647":"444"};
const EMP_STORE={"\u0639\u0645\u0627\u0631":1,"\u0646\u0648\u0631\u0647":2,"\u062C\u0639\u0641\u0631":3,"\u0645\u062B\u0646\u0649":2};
const SALARIES={"\u0639\u0645\u0627\u0631":200000,"\u062C\u0639\u0641\u0631":250000,"\u0645\u062B\u0646\u0649":250000,"\u0646\u0648\u0631\u0647":200000};
const EMP_ICONS={"\u0639\u0645\u0627\u0631":"\uD83D\uDC68\u200D\uD83D\uDCBC","\u062C\u0639\u0641\u0631":"\uD83D\uDC68\u200D\uD83D\uDCBC","\u0645\u062B\u0646\u0649":"\uD83D\uDC68\u200D\uD83D\uDCBC","\u0646\u0648\u0631\u0647":"\uD83D\uDC69\u200D\uD83D\uDCBC"};
const EMP_COLORS={"\u0639\u0645\u0627\u0631":"#a78bfa","\u062C\u0639\u0641\u0631":"#10B981","\u0645\u062B\u0646\u0649":"#38bdf8","\u0646\u0648\u0631\u0647":"#F59E0B"};
const PASS={owner:"0000"};
const PPW=5;
const PV=1000;
const WORK_START="12:00";
const SHOP_LAT=33.31033;
const SHOP_LNG=44.32380;
const MAX_DISTANCE=100;

function today(){return new Date().toLocaleDateString("en-CA");}
function fmt(n){return Number(n||0).toLocaleString("en-IQ")+" \u062F.\u0639";}
function fmtPts(n){return Number(n||0)+" \u0646\u0642\u0637\u0629";}
function calcDist(a,b,c,d){const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;const q=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q));}
function t2m(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function getWeekStart(){const d=new Date(),day=d.getDay(),diff=d.getDate()-((day+6)%7);const mon=new Date(d);mon.setDate(diff);return mon.toLocaleDateString("en-CA");}

// آخر يوم فيه مبيعات
function getLastDay(){
const all=Array.from(new Set(S.sales.map(function(x){return x.date;}))).sort(function(a,b){return b.localeCompare(a);});
return all.length>0?all[0]:today();
}

let S={li:false,role:null,emp:null,tab:"pos",sel:1,st:"store",sales:[],wallets:{},txs:[],att:[],notifs:[],es:"",loaded:false,eid:null,esid:null,rf:today(),rt:today(),rs:"all",ry:"all",rp:"today",modal:null,gps:false,pn:null};

function syncUI(s){const d=document.getElementById("sync-dot"),t=document.getElementById("sync-txt");if(!d||!t)return;if(s==="ok"){d.className="dot dot-green";t.textContent="\u0645\u062a\u0635\u0644";}else if(s==="saving"){d.className="dot dot-yellow";t.textContent="\u062c\u0627\u0631\u064a...";}else{d.className="dot dot-red";t.textContent="\u063a\u064a\u0631 \u0645\u062a\u0635\u0644";}}

onSnapshot(query(salesCol,orderBy("createdAt","desc")),function(snap){
S.sales=snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});});
S.loaded=true;syncUI("ok");
// النقاط فورية بعد اكتمال كل المحلات
const ld=getLastDay();
const sw=new Set(S.sales.filter(function(x){return x.date===ld&&x.type==="store";}).map(function(x){return x.store;}));
const ar=STORES.every(function(s){return sw.has(s.id);});
if(ar){getDoc(doc(db,"winners","winner_"+ld)).then(function(ws){if(!ws.exists())checkPts();});}
render();
},function(){syncUI("error");});

onSnapshot(walletsCol,function(snap){S.wallets={};snap.docs.forEach(function(d){S.wallets[d.id]=Object.assign({},d.data(),{id:d.id});});render();});
onSnapshot(query(txCol,orderBy("createdAt","desc")),function(snap){S.txs=snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});});render();});
onSnapshot(query(attendCol,orderBy("createdAt","desc")),function(snap){S.att=snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});});render();});
onSnapshot(query(notifsCol,orderBy("createdAt","desc")),function(snap){
S.notifs=snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});});
if(S.li&&S.emp&&!S.pn){var u=S.notifs.find(function(n){return n.type==="broadcast"&&!(n.readBy||{})[S.emp];});if(u)S.pn=u;}
render();
});

async function initW(){for(var i=0;i<EMPS.length;i++){var name=EMPS[i][0];var ref=doc(db,"wallets",name);var snap=await getDoc(ref);if(!snap.exists())await setDoc(ref,{name:name,balance:0,points:0,createdAt:serverTimestamp()});}}
initW();

function tryLogin(){
var pass=document.getElementById("pass-inp").value.trim();
var err=document.getElementById("login-err");
if(pass===PASS.owner){S.li=true;S.role="owner";S.emp=null;render();return;}
var keys=Object.keys(EMP_PASS);
for(var i=0;i<keys.length;i++){var name=keys[i];if(pass===EMP_PASS[name]){S.li=true;S.role="employee";S.emp=name;S.es=name;S.tab="pos";var u=S.notifs.find(function(n){return n.type==="broadcast"&&!(n.readBy||{})[name];});if(u)S.pn=u;render();return;}}
err.textContent="\u274c \u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631 \u063a\u0644\u0637";document.getElementById("pass-inp").value="";
}
function logout(){S.li=false;S.role=null;S.emp=null;S.es="";S.tab="pos";S.pn=null;render();}

async function addSale(){
var el=document.getElementById("inp-amount");
var amt=el?parseFloat(el.value):0;
if(!amt||amt<=0){alert("\u0623\u062f\u062e\u0644 \u0645\u0628\u0644\u063a \u0635\u062d\u064a\u062d!");return;}
if(!S.es){alert("\u0627\u062e\u062a\u0631 \u0627\u0633\u0645 \u0627\u0644\u0645\u0648\u0638\u0641!");return;}
var now=new Date();syncUI("saving");
await addDoc(salesCol,{store:S.sel,amount:amt,emp:S.es,type:S.st,date:today(),time:now.toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"}),createdAt:serverTimestamp()});
if(el)el.value="";
}
async function delSale(id){if(S.role!=="owner")return;if(!confirm("\u062d\u0630\u0641 \u0627\u0644\u0645\u0628\u064a\u0639\u0629\u061f"))return;await deleteDoc(doc(db,"shop_sales",id));}
async function saveEdit(){
var a=document.getElementById("edit-amount"),e=document.getElementById("edit-emp"),t=document.getElementById("edit-type"),s=document.getElementById("edit-store");
var amt=a?parseFloat(a.value):0;if(!amt||amt<=0){alert("\u0623\u062f\u062e\u0644 \u0645\u0628\u0644\u063a \u0635\u062d\u064a\u062d!");return;}
