<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>نظام مبيعات البسفور</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f0a1e;--bg2:#160e2e;--card:#1a1035;--card2:#231547;--border:#2d1f5e;--purple:#7c3aed;--purple2:#a78bfa;--purple3:#6d28d9;--gold:#f5c518;--gold2:#ffd700;--gold3:#b8860b;--green:#10b981;--red:#ef4444;--blue:#38bdf8;--orange:#f97316;--text:#e8e8f8;--muted:#7b6fa0;--nav-h:72px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo',sans-serif;direction:rtl;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.bg-orb1{width:400px;height:400px;background:radial-gradient(circle,#4c1d9533 0%,transparent 70%);top:-100px;right:-100px;}
.bg-orb2{width:300px;height:300px;background:radial-gradient(circle,#7c3aed22 0%,transparent 70%);bottom:100px;left:-80px;}
#loading{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:16px;}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--purple2);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}
#screen-login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:var(--bg);position:relative;overflow:hidden;}
.login-hero{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
.login-hero-img{font-size:72px;margin-bottom:4px;filter:drop-shadow(0 0 20px #f5c51866);animation:floatCrown 3s ease-in-out infinite;}
@keyframes floatCrown{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-title{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--purple2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;line-height:1.3;margin-top:8px;}
.login-sub{font-size:13px;color:var(--muted);margin-top:4px;}
.login-box{width:100%;max-width:360px;background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:24px;padding:28px;box-shadow:0 20px 60px #00000066;}
.role-toggle{display:flex;background:var(--bg);border-radius:14px;padding:4px;margin-bottom:20px;border:1px solid var(--border);}
.role-btn{flex:1;padding:10px;border-radius:11px;border:none;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .25s;color:var(--muted);background:none;}
.role-btn.active{background:var(--purple);color:#fff;box-shadow:0 4px 14px #7c3aed55;}
.inp-wrap{position:relative;margin-bottom:14px;}
.inp-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);}
.l-inp{width:100%;padding:13px 44px 13px 14px;border-radius:13px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.l-inp:focus{border-color:var(--purple2);}
.l-inp::placeholder{color:var(--muted);}
.login-btn-main{width:100%;padding:14px;border-radius:13px;border:none;background:linear-gradient(135deg,var(--purple),var(--purple3));color:#fff;font-family:'Cairo',sans-serif;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 6px 20px #7c3aed44;transition:all .2s;margin-top:4px;}
.login-btn-main:active{transform:scale(.98);}
.login-err{color:var(--red);font-size:12px;text-align:center;min-height:18px;margin-top:8px;}
#screen-app{min-height:100vh;padding-bottom:var(--nav-h);}
.top-header{background:linear-gradient(180deg,var(--bg2),transparent);padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);border-bottom:1px solid #ffffff08;}
.th-logo{font-size:16px;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--purple2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:6px;}
.th-right{display:flex;align-items:center;gap:8px;}
.role-pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;background:#7c3aed22;border:1px solid #7c3aed44;color:var(--purple2);}
.role-pill.emp{background:#f59e0b22;border-color:#f59e0b44;color:#f59e0b;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.logout-btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:6px 10px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:11px;cursor:pointer;}
.winner-banner{background:linear-gradient(90deg,var(--purple3),var(--purple),#8b5cf6,var(--purple),var(--purple3));background-size:300% 100%;animation:gradSlide 4s linear infinite;padding:12px 18px;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;text-align:center;}
@keyframes gradSlide{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.w-crown{animation:bounce 1s infinite;display:inline-block;font-size:18px;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.w-item{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:#fff;}
.w-name{color:var(--gold2);font-size:15px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:linear-gradient(180deg,transparent,var(--bg2) 20%);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0 6px;padding-bottom:env(safe-area-inset-bottom,0px);}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 14px;border-radius:14px;cursor:pointer;transition:all .2s;position:relative;flex:1;max-width:80px;}
.nav-item.active{background:#7c3aed22;}
.nav-icon{font-size:22px;transition:transform .2s;}
.nav-item.active .nav-icon{transform:translateY(-2px);}
.nav-lbl{font-size:10px;font-weight:700;color:var(--muted);transition:color .2s;}
.nav-item.active .nav-lbl{color:var(--purple2);}
.nav-badge{position:absolute;top:6px;right:10px;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;}
.nav-active-line{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:20px;height:3px;border-radius:3px 3px 0 0;background:var(--purple2);display:none;}
.nav-item.active .nav-active-line{display:block;}
.page{display:none;padding:14px 16px;}
.page.active{display:block;}
.sec-title{font-size:18px;font-weight:900;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.sec-title::before{content:'';width:4px;height:20px;background:var(--purple2);border-radius:4px;display:block;}
.stores-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.store-card{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:16px;padding:14px 10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;text-align:center;}
.store-card.sel{border-width:2px;}
.s-icon{font-size:26px;margin-bottom:6px;}
.s-name{font-size:12px;font-weight:900;}
.s-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.s-total{margin-top:8px;font-size:13px;font-weight:900;padding-top:7px;border-top:1px solid var(--border);}
.s-row{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;}
.sel-ring{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--purple2);display:none;}
.store-card.sel .sel-ring{display:block;}
.pos-box{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:16px;}
.pos-type-row{display:flex;gap:8px;margin-bottom:16px;}
.pos-type-btn{flex:1;padding:11px 8px;border-radius:12px;border:2px solid var(--border);background:var(--bg);color:var(--muted);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;}
.pos-type-btn.ts{border-color:var(--purple2);background:#7c3aed18;color:var(--purple2);}
.pos-type-btn.td{border-color:var(--blue);background:#38bdf818;color:var(--blue);}
.sum-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.sum-card{background:var(--bg);border-radius:12px;padding:10px 12px;border:1px solid var(--border);text-align:center;}
.sum-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;}
.sum-val{font-size:13px;font-weight:900;}
.inp-lbl{font-size:11px;color:var(--muted);margin-bottom:5px;}
.inp{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--purple2);}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.emp-sel-wrap{position:relative;}
.emp-btn{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.emp-dropdown{display:none;position:absolute;top:calc(100% + 4px);right:0;left:0;background:var(--card2);border:1px solid var(--border);border-radius:14px;overflow:hidden;z-index:50;box-shadow:0 10px 30px #00000088;}
.emp-opt{padding:12px 16px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;}
.emp-opt:hover{background:#7c3aed22;}
.add-btn{width:100%;padding:14px;border-radius:14px;border:none;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;color:#fff;transition:all .2s;}
.add-btn:active{transform:scale(.98);}
.add-btn.store-mode{background:linear-gradient(135deg,var(--purple2),var(--purple));}
.add-btn.del-mode{background:linear-gradient(135deg,#38bdf8,#0284c7);}
.sales-table-wrap{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.sales-table-head{display:grid;grid-template-columns:2fr 1fr 1fr auto;padding:12px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);font-weight:700;}
.sale-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;padding:12px 16px;border-bottom:1px solid #2d1f5e55;align-items:center;font-size:12px;}
.sale-row:last-child{border:none;}
.badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-s{background:#7c3aed18;border:1px solid #7c3aed44;color:var(--purple2);}
.badge-d{background:#38bdf818;border:1px solid #38bdf844;color:var(--blue);}
.sale-emp{font-size:11px;color:var(--muted);}
.sale-time{font-size:10px;color:var(--muted);}
.act-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;font-size:14px;}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.chip{padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .2s;font-family:'Cairo',sans-serif;}
.chip.active{background:var(--purple);border-color:var(--purple);color:#fff;}
.date-range-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.date-inp{padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;font-size:12px;outline:none;flex:1;min-width:130px;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.8);}
.grand-card{background:linear-gradient(135deg,#7c3aed22,#a78bfa11);border:1px solid #7c3aed44;border-radius:18px;padding:18px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.grand-total{font-size:26px;font-weight:900;}
.grand-subs{display:flex;gap:18px;flex-wrap:wrap;}
.grand-sub{text-align:center;}
.grand-sub-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;}
.grand-sub-val{font-size:14px;font-weight:900;}
.rep-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.rep-card{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:16px;padding:14px;text-align:center;}
.rep-mini{font-size:10px;color:var(--muted);margin-top:4px;}
.chart-box{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:16px;}
.bar-wrap{margin-bottom:10px;}
.bar-meta{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;}
.bar-track{height:10px;background:var(--bg);border-radius:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:10px;}
.wallet-card{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:14px;}
.wc-name{font-size:16px;font-weight:900;display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.wc-balance-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.wc-bal{background:var(--bg);border-radius:13px;padding:13px 14px;border:1px solid var(--border);}
.wc-bal-lbl{font-size:10px;color:var(--muted);margin-bottom:4px;}
.wc-bal-val{font-size:18px;font-weight:900;}
.wc-actions{display:flex;gap:6px;flex-wrap:wrap;}
.wc-btn{flex:1;min-width:70px;padding:8px 6px;border-radius:10px;border:none;font-family:'Cairo',sans-serif;font-size:10px;font-weight:700;cursor:pointer;text-align:center;}
.tx-list{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2d1f5e33;font-size:11px;}
.tx-item:last-child{border:none;}
.attend-today-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.attend-emp-card{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:16px;padding:14px;}
.punch-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.punch-btn{padding:16px;border-radius:16px;border:none;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;color:#fff;}
.notif-item{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
.notif-item.unread{border-color:#7c3aed55;}
.notif-dot{width:8px;height:8px;min-width:8px;border-radius:50%;background:var(--purple2);margin-top:4px;}
.bc-area{background:var(--bg);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;padding:14px;width:100%;resize:vertical;outline:none;min-height:100px;}
.overlay{position:fixed;inset:0;background:#000c;display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal{background:var(--card2);border:1px solid var(--border);border-radius:24px;width:100%;max-width:420px;padding:24px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:900;margin-bottom:20px;}
.form-row{margin-bottom:14px;}
.form-actions{display:flex;gap:10px;margin-top:20px;}
.modal-btn{flex:1;padding:13px;border-radius:13px;border:none;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.broadcast-alert{position:fixed;inset:0;background:#000d;display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;}
.ba-box{background:var(--card2);border:2px solid #7c3aed77;border-radius:24px;padding:28px;width:100%;max-width:380px;text-align:center;}
.my-wallet-hero{background:linear-gradient(145deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:24px;padding:24px;margin-bottom:16px;text-align:center;}
.my-bal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0;}
.my-bal-box{background:var(--bg);border-radius:16px;padding:16px;border:1px solid var(--border);text-align:center;}
.view-notice{background:#7c3aed11;border:1px solid #7c3aed33;border-radius:14px;padding:14px;text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px;}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:13px;}
select option{background:var(--card2);}
@media(max-width:360px){.inp-row{grid-template-columns:1fr;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

  const EMP_ICONS={"عمار":"👨‍💼","جعفر":"👨‍💼","مثنى":"👨‍💼","نوره":"👩‍💼"};

  function calcDist(a,b,c,d){const R=6371000,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;const q=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(q),Math.sqrt(1-q));}
  function tMins(t){const[h,m]=t.split(":").map(Number);return h*60+m;}

  let S={loggedIn:false,role:null,empName:null,tab:"pos",sel:1,saleType:"store",sales:[],wallets:{},txs:[],attendance:[],notifs:[],empSel:"",loaded:false,editId:null,editSaleId:null,repFrom:today(),repTo:today(),repStore:"all",repType:"all",repPeriod:"today",modal:null,gpsLoading:false,pendingNotif:null};

  // ===== POINTS =====
  async function checkPts(){
    const td=today();const wrRef=db.doc("winners/winner_"+td);const ws=await wrRef.get();if(ws.exists)return;
    const et={};S.sales.filter(x=>x.date===td&&x.type==="store").forEach(x=>{et[x.emp]=(et[x.emp]||0)+x.amount;});
    const ranked=Object.entries(et).sort((a,b)=>b[1]-a[1]);if(!ranked.length)return;
    const winner=ranked[0][0];
    const sw=new Set(S.sales.filter(x=>x.date===td&&x.type==="store").map(x=>x.store));
    if(!STORES.every(s=>sw.has(s.id)))return;
    const wkS=weekStart();
    const wkP=S.txs.filter(x=>x.emp===winner&&x.type==="points"&&x.amount>0&&x.date>=wkS).reduce((a,b)=>a+(b.amount||0),0);
    if(wkP>=25){await wrRef.set({emp:winner,date:td,pointsAwarded:false,updatedAt:TS()});return;}
    const wSnap=await db.doc("wallets/"+winner).get();
    if(wSnap.exists){
      await db.doc("wallets/"+winner).update({points:(wSnap.data().points||0)+PPW});
      await txCol.add({emp:winner,type:"points",amount:PPW,note:"🏆 فائز "+td+" +"+PPW+" نقاط",date:td,createdAt:TS()});
      await wrRef.set({emp:winner,date:td,pointsAwarded:true,updatedAt:TS()});
      await notifsCol.add({type:"points",to:winner,msg:"🏆 مبروك! فزت باليوم وحصلت على "+PPW+" نقاط",date:td,readBy:{},createdAt:TS()});
    }
  }
  function startCD(){

      const el=document.getElementById("cd-el");

    },1000);
  }

  async function managePoints(empName,pts,add){
    const w=S.wallets[empName]||{points:0};const cur=w.points||0;
    const newPts=add?cur+pts:Math.max(0,cur-pts);
    await db.doc("wallets/"+empName).update({points:newPts});
    await txCol.add({emp:empName,type:"points",amount:add?pts:-pts,note:(add?"➕":"➖")+" نقاط من المالك",date:today(),createdAt:TS()});

    const amt=SALARIES[empName]||0;const snap=await db.doc("wallets/"+empName).get();
    await db.doc("wallets/"+empName).update({balance:((snap.data()&&snap.data().balance)||0)+amt});

  async function deleteTx(id){
    if(!confirm("حذف هذه المعاملة?"))return;
    const tx=S.txs.find(x=>x.id===id);if(!tx)return;
    const wSnap=await db.doc("wallets/"+tx.emp).get();if(!wSnap.exists)return;
    const w=wSnap.data();
    if(tx.type==="salary"||tx.type==="add")await db.doc("wallets/"+tx.emp).update({balance:Math.max(0,(w.balance||0)-tx.amount)});
    else if(tx.type==="withdraw")await db.doc("wallets/"+tx.emp).update({balance:(w.balance||0)+tx.amount});
    else if(tx.type==="points"){if(tx.amount>0)await db.doc("wallets/"+tx.emp).update({points:Math.max(0,(w.points||0)-tx.amount)});else await db.doc("wallets/"+tx.emp).update({points:(w.points||0)+Math.abs(tx.amount)});}
    else if(tx.type==="convert"){const pb=Math.round(tx.amount/PV);await db.doc("wallets/"+tx.emp).update({balance:Math.max(0,(w.balance||0)-tx.amount),points:(w.points||0)+pb});}
    await db.doc("wallet_tx/"+id).delete();
  }

  // ===== ATTENDANCE =====
  async function punchIn(){
    const empName=S.empName;if(!empName)return;const td=today();
    const existing=S.attendance.find(x=>x.emp===empName&&x.date===td&&x.punchIn&&!x.punchOut);
    if(existing){alert("أنت مسجل حضور بالفعل!");return;}
    S.gpsLoading=true;render();
    navigator.geolocation.getCurrentPosition(async pos=>{
      const d=calcDist(pos.coords.latitude,pos.coords.longitude,SHOP_LAT,SHOP_LNG);
      S.gpsLoading=false;
      if(d>MAX_DIST){alert("❌ أنت بعيد "+Math.round(d)+" متر!");render();return;}
      const now=new Date();const ts=now.toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"});
      const nm=now.getHours()*60+now.getMinutes();const lb=Math.max(0,nm-tMins(WORK_START));
      await attendCol.add({emp:empName,date:td,punchIn:ts,punchOut:null,punchInMins:nm,punchOutMins:null,lateBy:lb,hours:null,createdAt:TS()});
      render();alert("✅ تسجيل الحضور\n"+ts+"\n"+(lb>0?"⚠️ متأخر "+lb+" دقيقة":"🟢 في الوقت"));
    },()=>{S.gpsLoading=false;render();alert("❌ تعذر الحصول على موقعك!");},{enableHighAccuracy:true,timeout:10000});
  }
  async function punchOut(){
    const empName=S.empName;if(!empName)return;const td=today();
    const existing=S.attendance.find(x=>x.emp===empName&&x.date===td&&x.punchIn&&!x.punchOut);
    if(!existing){alert("ما عندك بصمة حضور اليوم!");return;}
    S.gpsLoading=true;render();
    navigator.geolocation.getCurrentPosition(async pos=>{
      const d=calcDist(pos.coords.latitude,pos.coords.longitude,SHOP_LAT,SHOP_LNG);
      S.gpsLoading=false;
      if(d>MAX_DIST){alert("❌ أنت بعيد "+Math.round(d)+" متر!");render();return;}
      const now=new Date();const ts=now.toLocaleTimeString("en",{hour:"2-digit",minute:"2-digit"});
      const nm=now.getHours()*60+now.getMinutes();const hrs=Math.round((nm-existing.punchInMins)/60*10)/10;
      await db.doc("attendance/"+existing.id).update({punchOut:ts,punchOutMins:nm,hours:hrs});
      render();alert("✅ تسجيل الخروج\n"+ts+"\nساعات: "+hrs);
    },()=>{S.gpsLoading=false;render();alert("❌ تعذر!");},{enableHighAccuracy:true,timeout:10000});
  }

  // ===== WINNER BANNER =====
  function renderWinnerBanner(){
    const td=today(),et={};
    S.sales.filter(x=>x.date===td&&x.type==="store").forEach(x=>{et[x.emp]=(et[x.emp]||0)+x.amount;});
    let ranked=Object.entries(et).sort((a,b)=>b[1]-a[1]);let label=td;
    if(!ranked.length){
      const allD=Array.from(new Set(S.sales.filter(x=>x.type==="store").map(x=>x.date))).sort((a,b)=>b.localeCompare(a));
      for(const d of allD){if(d===td)continue;const pv={};S.sales.filter(x=>x.date===d&&x.type==="store").forEach(x=>{pv[x.emp]=(pv[x.emp]||0)+x.amount;});if(Object.keys(pv).length){ranked=Object.entries(pv).sort((a,b)=>b[1]-a[1]);label=d;break;}}
    }
    const sw=new Set(S.sales.filter(x=>x.date===td&&x.type==="store").map(x=>x.store));
    const ar=STORES.every(s=>sw.has(s.id)),isT=label===td;
    const meds=["🥇","🥈","🥉"];
    let cdH="";
    if(cdS>0&&ar&&isT){const m=Math.floor(cdS/60),s=cdS%60;cdH=`<span id="cd-el" style="background:#ffffff22;padding:2px 10px;border-radius:20px;font-size:11px">⏳ ${m}:${String(s).padStart(2,"0")}</span>`;}
    else if(ar&&isT)cdH=`<span id="cd-el" style="background:#10b98133;padding:2px 10px;border-radius:20px;font-size:11px;color:#10b981">✅ كل المحلات سجلت</span>`;
    else if(isT){const ss=STORES.map(s=>sw.has(s.id)?`<span style="color:#10b981">${s.icon}✓</span>`:`<span style="color:#ef4444">${s.icon}⏳</span>`).join(" ");cdH=`<span id="cd-el" style="background:#ffffff22;padding:2px 10px;border-radius:20px;font-size:11px">${ss}</span>`;}
    if(!ranked.length)return`<div class="winner-banner"><div class="w-item">🏪 <b>نظام مبيعات البسفور</b></div></div>`;
    const items=ranked.map((r,i)=>`<div class="w-item"><span class="w-crown">${meds[i]||"🏅"}</span><span>${i===0?(isT?"👑 الفائز":"فائز "+label):"المركز "+(i+1)}: </span><span class="w-name">${r[0]}</span><span style="color:#ffd700;margin:0 6px">${fmt(r[1])}</span>${i===0&&isT?cdH:""}${i<ranked.length-1?'<span style="color:#ffffff44;margin:0 8px">✦</span>':""}</div>`).join("");
    return`<div class="winner-banner">${items}</div>`;
  }

  // ===== RENDER POS =====
  function renderPOS(){
    const td=today(),isO=S.role==="owner",isE=!!S.empName;
    const myS=isE?EMP_STORE[S.empName]:null;
    if(isE&&myS&&S.sel!==myS)S.sel=myS;
    if(isE&&!S.empSel)S.empSel=S.empName;
    const ts=S.sales.filter(x=>x.date===td&&x.type==="store");
    let dd=td;

const myTxs=S.txs.filter(x=>x.emp===nm);
const txRows=myTxs.length===0?`<div class="empty">لا توجد معاملات</div>`:myTxs.map(x=>{const isNeg=x.type===“withdraw”||x.type===“reset”||(x.type===“points”&&x.amount<0);return`<div class="sale-row"><div><div style="font-size:11px;font-weight:700;color:${isNeg?"#ef4444":"#10b981"}">${isNeg?"− ":"+ "}${x.type==="points"?fmtPts(Math.abs(x.amount)):fmt(Math.abs(x.amount))}</div><div class="sale-emp">${x.note||x.type}</div></div><div></div><div class="sale-time">${x.date||""}</div><div></div></div>`;}).join(””);
return`<div class="my-wallet-hero" style="border-color:${c}55"><div style="font-size:56px;margin-bottom:10px">${icon}</div><div style="font-size:22px;font-weight:900;color:${c}">${nm}</div><div style="font-size:12px;color:#7b6fa0;margin-top:4px">محفظتي الشخصية</div><div class="my-bal-grid"><div class="my-bal-box" style="border-color:${c}44"><div class="wc-bal-lbl">💰 رصيدي</div><div style="font-size:20px;font-weight:900;color:${c}">${fmt(w.balance||0)}</div></div><div class="my-bal-box" style="border-color:#ffd70044"><div class="wc-bal-lbl">🏅 نقاطي</div><div style="font-size:20px;font-weight:900;color:#ffd700">${w.points||0}</div><div style="font-size:11px;color:#7b6fa0">= ${fmt((w.points||0)*PV)}</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><button onclick="doConvert('${nm}')" style="padding:12px;background:linear-gradient(135deg,#ffd700,#b8860b);color:#000;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:900;cursor:pointer">🎯 تحويل نقاط</button><button onclick="openWithdraw('${nm}')" style="padding:12px;background:#38bdf818;border:1px solid #38bdf844;color:#38bdf8;border-radius:12px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer">💸 طلب سلفة</button></div></div><div class="sec-title">📋 سجل المعاملات</div><div class="sales-table-wrap">${myTxs.length===0?`<div class="empty">لا توجد معاملات</div>`:txRows}</div>`;
}

// ===== RENDER MY ATTEND =====
function renderMyAttend(nm){
const c=EMP_COLORS[nm]||”#a78bfa”;const td=today();
const tr=S.attendance.find(x=>x.emp===nm&&x.date===td);
const mr=Array.from(S.attendance.filter(x=>x.emp===nm)).sort((a,b)=>b.date.localeCompare(a.date));
let statusBox=””;
if(tr&&tr.punchOut)statusBox=`<div style="background:#10b98118;border:1px solid #10b98144;border-radius:16px;padding:18px;text-align:center;margin-bottom:16px"><div style="font-size:32px;margin-bottom:8px">✅</div><div style="font-weight:700;color:#10b981;font-size:16px">اكتمل دوامك</div><div style="font-size:12px;color:#7b6fa0;margin-top:6px">حضور: ${tr.punchIn} — خروج: ${tr.punchOut} | ${tr.hours}س</div></div>`;
else if(tr)statusBox=`<div style="background:#ffd70018;border:1px solid #ffd70044;border-radius:16px;padding:18px;text-align:center;margin-bottom:16px"><div style="font-size:32px;margin-bottom:8px">⏳</div><div style="font-weight:700;color:#ffd700;font-size:16px">أنت في الدوام</div><div style="font-size:12px;color:#7b6fa0;margin-top:6px">بصمة: ${tr.punchIn}</div>${tr.lateBy>0?`<div style="font-size:11px;color:#ef4444">⚠️ متأخر ${tr.lateBy} دقيقة</div>`:`<div style="font-size:11px;color:#10b981">🟢 في الوقت</div>`}</div>`;
else statusBox=`<div style="background:#ef444418;border:1px solid #ef444444;border-radius:16px;padding:18px;text-align:center;margin-bottom:16px"><div style="font-size:32px;margin-bottom:8px">📍</div><div style="font-weight:700;color:#ef4444;font-size:16px">لم تسجل حضورك بعد</div></div>`;
const tD=mr.filter(x=>x.punchOut).length;const tH=mr.filter(x=>x.hours).reduce((a,b)=>a+(b.hours||0),0);const lD=mr.filter(x=>x.lateBy>0).length;
const rows=mr.slice(0,14).map(r=>`<div class="sale-row"><div class="sale-time">${r.date}</div><div style="color:#10b981;font-size:12px">${r.punchIn||"—"}${r.lateBy>0?`<span style="color:#ef4444"> +${r.lateBy}د</span>`:""}</div><div style="color:#a78bfa;font-size:12px">${r.punchOut||"—"}</div><div style="font-size:12px">${r.hours!=null?r.hours+"س":"—"}</div></div>`).join(””);
return`<div class="sec-title" style="color:${c}">📍 حضوري — ${nm}</div>${statusBox}<div class="punch-btns"><button class="punch-btn" style="background:linear-gradient(135deg,#10b981,#059669)" onclick="doPunchIn()" ${S.gpsLoading?"disabled":""}>${S.gpsLoading?"⏳ جاري...":"📍 بصمة حضور"}</button><button class="punch-btn" style="background:linear-gradient(135deg,#ef4444,#dc2626)" onclick="doPunchOut()" ${S.gpsLoading?"disabled":""}>${S.gpsLoading?"⏳ جاري...":"🚪 بصمة خروج"}</button></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px"><div class="sum-card"><div class="sum-lbl">📅 أيام</div><div class="sum-val" style="color:#10b981">${tD}</div></div><div class="sum-card"><div class="sum-lbl">⏱ ساعات</div><div class="sum-val" style="color:${c}">${Math.round(tH*10)/10}</div></div><div class="sum-card"><div class="sum-lbl">⚠️ تأخير</div><div class="sum-val" style="color:#ef4444">${lD}</div></div></div><div class="sales-table-wrap"><div style="padding:14px 16px;font-weight:700;border-bottom:1px solid var(--border)">📋 سجل الحضور</div><div class="sales-table-head"><div>التاريخ</div><div>حضور</div><div>خروج</div><div>الساعات</div></div>${mr.length===0?`<div class="empty">لا يوجد سجل</div>`:rows}</div>`;
}
window.doPunchIn=punchIn;window.doPunchOut=punchOut;

// ===== RENDER MY NOTIFS =====
function renderMyNotifs(nm){
const mn=S.notifs.filter(n=>n.to===nm||n.to===“all”).slice(0,30);
const ur=mn.filter(n=>!(n.readBy||{})[nm]).length;
const rows=mn.length===0?`<div class="empty">لا توجد إشعارات</div>`:mn.map(n=>{const ir=(n.readBy||{})[nm];const ic={salary:“💰”,points:“🏆”,withdraw:“💸”,convert:“🎯”,add:“💵”,broadcast:“📢”,reset:“🔄”}[n.type]||“🔔”;return`<div class="notif-item${!ir?" unread":""}">${!ir?`<div class="notif-dot"></div>`:`<div style="width:8px"></div>`}<div style="flex:1"><div style="font-size:13px;margin-bottom:4px">${ic} ${n.msg}</div><div style="font-size:11px;color:#7b6fa0">${n.date||""}</div></div></div>`;}).join(””);
return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><div class="sec-title">🔔 الإشعارات${ur>0?` <span style="background:#ef4444;color:#fff;padding:2px 8px;border-radius:20px;font-size:12px">${ur}</span>`:""}</div>${ur>0?`<button onclick="doMarkAllRead()" style="background:var(--bg);border:1px solid var(--border);color:#7b6fa0;padding:7px 14px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:11px;cursor:pointer">✓ قراءة الكل</button>`:""}</div>${rows}`;
}
window.doMarkAllRead=markAllRead;

// ===== RENDER MODAL =====
function renderModal(){
const m=S.modal;
if(S.editId){const sale=S.sales.find(x=>x.id===S.editId);if(!sale)return””;return`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">✏️ تعديل</div><div class="form-row"><div class="inp-lbl">المحل</div><select class="inp" id="edit-store">${STORES.map(s=>`<option value=”${s.id}”${sale.store===s.id?” selected”:””}>${s.icon} ${s.name}</option>`).join("")}</select></div><div class="form-row"><div class="inp-lbl">الموظف</div><select class="inp" id="edit-emp">${EMPS.map(e=>`<option value=”${e[0]}”${sale.emp===e[0]?” selected”:””}>${e[1]} ${e[0]}</option>`).join("")}</select></div><div class="form-row"><div class="inp-lbl">النوع</div><select class="inp" id="edit-type"><option value="store"${sale.type==="store"?" selected":""}>🏪 محل</option><option value="delivery"${sale.type==="delivery"?" selected":""}>🚚 توصيل</option></select></div><div class="form-row"><div class="inp-lbl">المبلغ</div><input class="inp" id="edit-amount" type="number" value="${sale.amount}"/></div><div class="form-actions"><button class="modal-btn" style="background:var(--bg);border:1px solid var(--border);color:#7b6fa0" onclick="closeModal()">إلغاء</button><button class="modal-btn" style="background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff" onclick="doSaveEdit()">💾 حفظ</button></div></div></div>`;}
if(S.editSaleId){const s2=S.sales.find(x=>x.id===S.editSaleId);if(!s2)return””;const st=STORES.find(s=>s.id===s2.store);return`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">⚙️ تعديل</div><div style="background:var(--bg);border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:#7b6fa0">${st?st.icon:""} ${st?st.name:""} - ${s2.emp||""} - ${s2.time||""}</div><div class="form-row"><div class="inp-lbl">التاريخ</div><input class="inp" id="se-date" type="date" value="${s2.date}"/></div><div class="form-row"><div class="inp-lbl">المبلغ</div><input class="inp" id="se-amount" type="number" value="${s2.amount}"/></div><div class="form-actions"><button class="modal-btn" style="background:var(--bg);border:1px solid var(--border);color:#7b6fa0" onclick="closeModal()">إلغاء</button><button class="modal-btn" style="background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff" onclick="doSaveSaleEdit()">💾 حفظ</button></div></div></div>`;}
if(!m)return””;
if(m.type===“addmoney”)return`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">💵 إضافة — ${m.emp}</div><div style="background:var(--bg);border-radius:12px;padding:14px;margin-bottom:18px;text-align:center;border:1px solid #10b98133"><div class="sum-lbl">الرصيد</div><div style="font-size:22px;font-weight:900;color:#10b981">${fmt((S.wallets[m.emp]||{}).balance||0)}</div></div><div class="form-row"><div class="inp-lbl">المبلغ</div><input class="inp" id="am-amount" type="number" placeholder="50000"/></div><div class="form-row"><div class="inp-lbl">السبب</div><select class="inp" id="am-note"><option>إضافة أموال</option><option>مكافأة</option><option>عمولة</option><option>أخرى</option></select></div><div class="form-actions"><button class="modal-btn" style="background:var(--bg);border:1px solid var(--border);color:#7b6fa0" onclick="closeModal()">إلغاء</button><button class="modal-btn" style="background:linear-gradient(135deg,#10b981,#059669);color:#fff" onclick="doAddMoneyConfirm()">✅ إضافة</button></div></div></div>`;
if(m.type===“withdraw”)return`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">💸 سحب — ${m.emp}</div><div style="background:var(--bg);border-radius:12px;padding:14px;margin-bottom:18px;text-align:center;border:1px solid #10b98133"><div class="sum-lbl">الرصيد</div><div style="font-size:22px;font-weight:900;color:#10b981">${fmt((S.wallets[m.emp]||{}).balance||0)}</div></div><div class="form-row"><div class="inp-lbl">المبلغ</div><input class="inp" id="wd-amount" type="number" placeholder="50000"/></div><div class="form-row"><div class="inp-lbl">السبب</div><select class="inp" id="wd-note"><option>سلفة</option><option>سحب راتب</option><option>مصاريف</option><option>أخرى</option></select></div><div class="form-actions"><button class="modal-btn" style="background:var(--bg);border:1px solid var(--border);color:#7b6fa0" onclick="closeModal()">إلغاء</button><button class="modal-btn" style="background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff" onclick="doWithdrawConfirm()">💸 تأكيد</button></div></div></div>`;
if(m.type===“managepoints”){const w=S.wallets[m.emp]||{points:0};return`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-title">🏅 نقاط — ${m.emp}</div><div style="background:var(--bg);border-radius:12px;padding:14px;margin-bottom:18px;text-align:center;border:1px solid #ffd70033"><div class="sum-lbl">النقاط</div><div style="font-size:28px;font-weight:900;color:#ffd700">${w.points||0} نقطة</div><div style="font-size:12px;color:#7b6fa0">= ${fmt((w.points||0)*PV)}</div></div><div class="form-row"><div class="inp-lbl">عدد النقاط</div><input class="inp" id="pts-amount" type="number" placeholder="5" min="1"/></div><div class="form-actions"><button class="modal-btn" style="background:var(--bg);border:1px solid var(--border);color:#7b6fa0" onclick="closeModal()">إلغاء</button><button class="modal-btn" style="background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff" onclick="doManagePts('${m.emp}',false)">➖ حذف</button><button class="modal-btn" style="background:linear-gradient(135deg,#ffd700,#b8860b);color:#000" onclick="doManagePts('${m.emp}',true)">➕ إضافة</button></div></div></div>`;}
return””;
}
window.closeModal=function(){S.modal=null;S.editId=null;S.editSaleId=null;render();};
window.doSaveEdit=saveEdit;
window.doSaveSaleEdit=saveSaleEdit;
window.doAddMoneyConfirm=async function(){const a=document.getElementById(“am-amount”),n=document.getElementById(“am-note”);const amt=a?parseFloat(a.value):0;const note=n?n.value:””;if(!amt||amt<=0){alert(“أدخل مبلغ!”);return;}await addMoney(S.modal.emp,amt,note);};
window.doWithdrawConfirm=async function(){const a=document.getElementById(“wd-amount”),n=document.getElementById(“wd-note”);const amt=a?parseFloat(a.value):0;const note=n?n.value:””;if(!amt||amt<=0){alert(“أدخل مبلغ!”);return;}await doWithdraw(S.modal.emp,amt,note);};
window.doManagePts=async function(emp,add){const pts=parseInt(document.getElementById(“pts-amount”)?document.getElementById(“pts-amount”).value:0);if(!pts||pts<=0){alert(“أدخل عدد صحيح!”);return;}await managePoints(emp,pts,add);};

// ===== MAIN RENDER =====
function render(){
if(!S.loggedIn){
document.getElementById(“loading”).style.display=“none”;
document.getElementById(“screen-login”).className=“screen active”;
document.getElementById(“screen-app”).className=“screen”;
return;
}
document.getElementById(“loading”).style.display=“none”;
document.getElementById(“screen-login”).className=“screen”;
document.getElementById(“screen-app”).className=“screen active”;
const rb=document.getElementById(“role-badge”);
if(rb){rb.textContent=S.role===“owner”?“👑 مالك”:“💼 “+S.empName;rb.className=“role-pill”+(S.role===“employee”?” emp”:””);}
document.getElementById(“winner-banner”).innerHTML=renderWinnerBanner();
document.getElementById(“bottom-nav”).innerHTML=renderBottomNav();
const pages=[“pos”,“report”,“wallets”,“attend”,“more”,“mywallet”,“myattend”,“notifs”];
pages.forEach(p=>{document.getElementById(“page-”+p).className=“page”;});
const isO=S.role===“owner”,isE=S.role===“employee”&&S.empName;
let content=””,pageId=S.tab;
if(S.tab===“pos”)content=renderPOS();
else if(S.tab===“report”&&isO)content=renderReport();
else if(S.tab===“wallets”&&isO)content=renderWallets();
else if(S.tab===“attend”&&isO)content=renderAttendAdmin();
else if(S.tab===“more”&&isO)content=renderMore();
else if(S.tab===“mywallet”&&isE)content=renderMyWallet(S.empName);
else if(S.tab===“myattend”&&isE)content=renderMyAttend(S.empName);
else if(S.tab===“notifs”&&isE)content=renderMyNotifs(S.empName);
else if(isE){S.tab=“mywallet”;content=renderMyWallet(S.empName);pageId=“mywallet”;}
else content=renderPOS();
const pg=document.getElementById(“page-”+pageId);
if(pg){pg.innerHTML=content;pg.className=“page active”;}
document.getElementById(“modal-wrap”).innerHTML=(S.modal||S.editId||S.editSaleId)?renderModal():””;
if(S.pendingNotif){const n=S.pendingNotif;document.getElementById(“modal-wrap”).innerHTML=`<div class="broadcast-alert"><div class="ba-box"><div style="font-size:40px;margin-bottom:12px">📢</div><div style="font-weight:900;font-size:17px;margin-bottom:8px">رسالة من المالك</div><div style="background:var(--bg);border-radius:12px;padding:16px;margin-bottom:20px;font-size:15px;line-height:1.7;border:1px solid #7c3aed33">${n.msg}</div><div style="font-size:11px;color:#7b6fa0;margin-bottom:20px">${n.date||""}</div><button onclick="doDismiss()" style="width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:13px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:900;cursor:pointer">✅ حسناً</button></div></div>`;}
}
window.doDismiss=dismissPendingNotif;

// Show login immediately
render();
}

// Wait for Firebase SDKs to load then start
function waitForFirebase(){
if(typeof firebase !== “undefined” && firebase.firestore){
startApp();
} else {
setTimeout(waitForFirebase, 50);
}
}
waitForFirebase();
</script>

</body>
</html>
